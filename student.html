    function makeTxtBox(containerId, labelsArr, color, fontSize) {
      const container = document.getElementById(containerId);
      if (!container) return;

      const wrap = document.createElement('div');
      wrap.className = 'txt-box-wrap selected';
      wrap.style.cssText = 'left:60px;top:60px;width:200px;';

      // テキストエリア
      const ta = document.createElement('textarea');
      ta.className = 'txt-box-input';
      ta.placeholder = 'テキスト入力';
      ta.style.color = color || '#1e293b';
      ta.style.fontSize = (fontSize || 20) + 'px';
      ta.rows = 2;

      // 削除ボタン（右上）
      const delBtn = document.createElement('button');
      delBtn.className = 'txt-del-btn';
      delBtn.innerHTML = '✕';
      delBtn.title = '削除';

      // リサイズハンドル（右下）
      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'txt-resize-handle';
      resizeHandle.innerHTML = '⤡';

      // 完了ボタン（左上・編集モード時のみ）
      const doneBtn = document.createElement('button');
      doneBtn.className = 'txt-done-btn';
      doneBtn.innerHTML = '✓ 完了';
      doneBtn.title = '編集完了';

      wrap.appendChild(ta);
      wrap.appendChild(delBtn);
      wrap.appendChild(resizeHandle);
      wrap.appendChild(doneBtn);
      container.appendChild(wrap);

      const lblObj = {
        el: wrap,
        getText: () => ta.value,
        getStyle: () => ({
          left: parseInt(wrap.style.left) || 0,
          top:  parseInt(wrap.style.top)  || 0,
          width: wrap.offsetWidth,
          height: wrap.offsetHeight,
          color: ta.style.color, text: ta.value,
          fontSize: parseInt(ta.style.fontSize) || 20
        })
      };
      labelsArr.push(lblObj);

      // ===== モード管理 =====
      // selected: 移動モード（シングルタップ後）
      // edit-mode: 編集モード（ダブルタップ後）
      // 両方なし: 非選択

      function enterMoveMode() {
        selectTxt(wrap);             // 他のboxを非選択に
        wrap.classList.add('selected');
        wrap.classList.remove('edit-mode');
      }
      function enterEditMode() {
        selectTxt(wrap);
        wrap.classList.add('selected', 'edit-mode');
        ta.focus();
        // カーソルを末尾に
        const len = ta.value.length;
        ta.setSelectionRange(len, len);
      }
      function exitAll() {
        wrap.classList.remove('selected', 'edit-mode');
        ta.blur();
      }

      // ===== シングルタップ → 移動モード =====
      // ダブルタップ → 編集モード
      let tapTimer = null, tapCount = 0;
      wrap.addEventListener('pointerdown', e => {
        if (e.target === delBtn || e.target === resizeHandle || e.target === doneBtn) return;
        // 編集モード中にテキストエリアをタップ → そのまま入力
        if (wrap.classList.contains('edit-mode') && e.target === ta) return;
        e.preventDefault();
        tapCount++;
        if (tapCount === 1) {
          tapTimer = setTimeout(() => {
            tapCount = 0;
            enterMoveMode();
          }, 250);
        } else if (tapCount >= 2) {
          clearTimeout(tapTimer);
          tapCount = 0;
          enterEditMode();
        }
      });

      // ===== 移動: 移動モード中に wrap をドラッグ =====
      let moveDrag = false, moveSX, moveSY, moveOX, moveOY, moveStarted = false;
      wrap.addEventListener('pointerdown', e => {
        if (e.target === delBtn || e.target === resizeHandle || e.target === doneBtn) return;
        if (wrap.classList.contains('edit-mode')) return;
        moveDrag = true;
        moveStarted = false;
        wrap.setPointerCapture(e.pointerId);
        moveSX = e.clientX; moveSY = e.clientY;
        moveOX = parseInt(wrap.style.left) || 0;
        moveOY = parseInt(wrap.style.top)  || 0;
      });
      wrap.addEventListener('pointermove', e => {
        if (!moveDrag) return;
        const dx = e.clientX - moveSX, dy = e.clientY - moveSY;
        if (!moveStarted && Math.hypot(dx, dy) < 5) return;
        moveStarted = true;
        const parent = wrap.parentElement;
        const maxX = parent ? parent.offsetWidth  - wrap.offsetWidth  : 9999;
        const maxY = parent ? parent.offsetHeight - wrap.offsetHeight : 9999;
        wrap.style.left = Math.max(0, Math.min(maxX, moveOX + dx)) + 'px';
        wrap.style.top  = Math.max(0, Math.min(maxY, moveOY + dy)) + 'px';
      });
      wrap.addEventListener('pointerup',    () => { moveDrag = false; });
      wrap.addEventListener('pointercancel',() => { moveDrag = false; });

      // ===== リサイズ =====
      let resDrag = false, resSX, resSY, resOW, resOH;
      resizeHandle.addEventListener('pointerdown', e => {
        e.preventDefault(); e.stopPropagation();
        resDrag = true;
        resizeHandle.setPointerCapture(e.pointerId);
        resSX = e.clientX; resSY = e.clientY;
        resOW = wrap.offsetWidth;
        resOH = ta.offsetHeight;
      });
      resizeHandle.addEventListener('pointermove', e => {
        if (!resDrag) return;
        wrap.style.width = Math.max(80,  resOW + e.clientX - resSX) + 'px';
        ta.style.height  = Math.max(40, resOH + e.clientY - resSY) + 'px';
      });
      resizeHandle.addEventListener('pointerup',    () => { resDrag = false; });
      resizeHandle.addEventListener('pointercancel',() => { resDrag = false; });

      // ===== 削除 =====
      delBtn.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); });
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        wrap.remove();
        const i = labelsArr.indexOf(lblObj);
        if (i >= 0) labelsArr.splice(i, 1);
        if (typeof gWbScheduleSnapshot === 'function' && gWbGroupId) gWbScheduleSnapshot();
        if (containerId === 'img-labels' && typeof imgScheduleSnapshot === 'function') imgScheduleSnapshot();
      });

      // ===== 完了ボタン =====
      doneBtn.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); });
      doneBtn.addEventListener('click', e => {
        e.stopPropagation();
        wrap.classList.remove('edit-mode');
        wrap.classList.add('selected');
        ta.blur();
        if (containerId === 'img-labels' && typeof imgScheduleSnapshot === 'function') imgScheduleSnapshot();
      });

      // ===== テキスト入力 =====
      ta.addEventListener('input', () => {
        if (typeof gWbScheduleSnapshot === 'function' && gWbGroupId) gWbScheduleSnapshot();
        // 配布画像のテキストボックスの場合はimgSnapshotもスケジュール
        if (containerId === 'img-labels' && typeof imgScheduleSnapshot === 'function') imgScheduleSnapshot();
      });

      // 初期状態: 移動モードで開始
      enterMoveMode();
      setTimeout(() => ta.focus(), 50); // 最初だけ入力できるように
      return lblObj;
    }

    function selectTxt(wrap) {
      if (_selectedTxt && _selectedTxt !== wrap) {
        _selectedTxt.classList.remove('selected', 'edit-mode');
        _selectedTxt.querySelector('.txt-box-input')?.blur();
      }
      _selectedTxt = wrap;
    }

    // canvas外クリックで選択解除
    function deselectTxt() {
      if (_selectedTxt) { _selectedTxt.classList.remove('selected', 'edit-mode'); _selectedTxt = null; }
    }

    // テキストボックスをcanvasに焼き込む（提出・スナップショット用）
    function burnTxtBoxes(ctx, labelsArr, canvasEl) {
      labelsArr.forEach(lb => {
        const st = lb.getStyle();
        const scaleX = canvasEl.width  / (canvasEl.offsetWidth  || canvasEl.width);
        const scaleY = canvasEl.height / (canvasEl.offsetHeight || canvasEl.height);
        const fontSize = (st.fontSize || 18) * scaleY;
        const lineGap  = fontSize * 1.4;
        ctx.save();
        ctx.font = `bold ${fontSize}px 'Noto Sans JP', sans-serif`;
        ctx.fillStyle = st.color || '#1e293b';
        const padLeft = 8 * scaleX;
        const padTop  = 6 * scaleY;
        // テキストボックス幅をcanvas論理pxに換算して折り返し幅とする
        const maxLineWidth = Math.max((st.width || 200) * scaleX - padLeft * 2, fontSize * 2);
        const wrappedLines = _wrapTextToLines(ctx, st.text || '', maxLineWidth);
        let y = st.top * scaleY + padTop + fontSize;
        wrappedLines.forEach(line => {
          ctx.fillText(line, st.left * scaleX + padLeft, y);
          y += lineGap;
        });
        ctx.restore();
      });
    }

    // テキストを指定幅で折り返して行配列を返す（student側ヘルパー）
    function _wrapTextToLines(ctx, text, maxWidth) {
      const lines = [];
      text.split('\n').forEach(paragraph => {
        if (!paragraph) { lines.push(''); return; }
        if (ctx.measureText(paragraph).width <= maxWidth) {
          lines.push(paragraph);
          return;
        }
        let current = '';
        for (const ch of paragraph) {
          const test = current + ch;
          if (ctx.measureText(test).width > maxWidth && current.length > 0) {
            lines.push(current);
            current = ch;
          } else {
            current = test;
          }
        }
        if (current.length > 0) lines.push(current);
      });
      return lines;
    }

    // ===== ホワイトボード =====
    let wbCanvas = null, wbCtx = null;
    let wbTool = 'pen', wbColor = '#1e293b', wbSize = 4, wbFontSize = 16;
    let wbDrawing = false, wbLX = 0, wbLY = 0;
    let wbLabels = [];

    function wbInit() {
      wbCanvas = document.getElementById('wb-canvas');
      if (!wbCanvas || wbCtx) return;
      wbCtx = wbCanvas.getContext('2d', { willReadFrequently: true });
      wbResize(true);
      window.addEventListener('resize', wbResize);
      wbCanvas.addEventListener('pointerdown', e => {
        if (_selectedTxt) { deselectTxt(); return; }
        if (_wbTextMode) { makeTxtBox('wb-labels', wbLabels, wbColor, wbFontSize); return; }
        wbDrawing = true;
        wbCanvas.setPointerCapture(e.pointerId);
        const r = wbCanvas.getBoundingClientRect();
        wbLX = (e.clientX-r.left)*wbCanvas.width/r.width;
        wbLY = (e.clientY-r.top)*wbCanvas.height/r.height;
      });
      wbCanvas.addEventListener('pointermove', e => {
        if (!wbDrawing) return;
        const r = wbCanvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(wbCanvas.width,  (e.clientX-r.left)*wbCanvas.width/r.width));
        const y = Math.max(0, Math.min(wbCanvas.height, (e.clientY-r.top)*wbCanvas.height/r.height));
        wbDraw(wbLX, wbLY, x, y);
        wbLX = x; wbLY = y;
        wbSignalDrawing();
      });
      wbCanvas.addEventListener('pointerup', () => { wbDrawing = false; wbScheduleSnapshot(); deselectTxt(); });
      wbCanvas.addEventListener('pointercancel', () => { wbDrawing = false; wbScheduleSnapshot(); });
      wbCanvas.addEventListener('pointerleave', e => { if (e.buttons === 0) { wbDrawing = false; wbScheduleSnapshot(); } });
    }
    function wbResize(forceInit) {
      if (!wbCanvas) return;
      const wrap = wbCanvas.parentElement;
      const newW = wrap.offsetWidth;
      const newH = wrap.offsetHeight;
      // サイズが0の場合はスキップ
      if (!newW || !newH) return;
      // リサイズイベント由来でサイズ変化がない場合はスキップ
      if (!forceInit && wbCanvas.width === newW && wbCanvas.height === newH) return;
      // リサイズ前にペン線を退避（同期）
      let savedDrawing = null;
      const prevW = wbCanvas.width;
      const prevH = wbCanvas.height;
      if (wbCtx && prevW > 0 && prevH > 0) {
        try { savedDrawing = wbCtx.getImageData(0, 0, prevW, prevH); } catch(e) {}
      }
      wbCanvas.width = newW;
      wbCanvas.height = newH;
      // 白背景を塗ってからペン線を復元
      wbCtx.fillStyle = 'white';
      wbCtx.fillRect(0, 0, newW, newH);
      if (savedDrawing && prevW > 0 && prevH > 0) {
        const tmp = document.createElement('canvas');
        tmp.width = prevW; tmp.height = prevH;
        tmp.getContext('2d').putImageData(savedDrawing, 0, 0);
        wbCtx.drawImage(tmp, 0, 0, prevW, prevH, 0, 0, newW, newH);
      }
    }
    function wbDraw(x1, y1, x2, y2) {
      if (!wbCtx) return;
      wbCtx.beginPath(); wbCtx.moveTo(x1,y1); wbCtx.lineTo(x2,y2);
      wbCtx.lineCap='round'; wbCtx.lineJoin='round';
      if (wbTool==='eraser') {
        wbCtx.strokeStyle='white'; wbCtx.lineWidth=wbSize*5;
      } else {
        wbCtx.strokeStyle=wbColor; wbCtx.lineWidth=wbSize;
      }
      wbCtx.stroke();
    }
    function wbOpen() {
      const overlay = document.getElementById('wb-overlay');
      if (overlay) overlay.classList.add('show');
      wbInit();
      const inst = window._wbInstruction || '';
      const el = document.getElementById('wb-instruction-text');
      if (el) { el.textContent = inst || '先生の指示を待っています...'; el.classList.toggle('empty', !inst); }
    }
    function wbClose() {
      const overlay = document.getElementById('wb-overlay');
      if (overlay) overlay.classList.remove('show');
    }
    window.wbClear = function() {
      if (wbCtx) { wbCtx.fillStyle='white'; wbCtx.fillRect(0,0,wbCanvas.width,wbCanvas.height); }
      wbLabels = [];
      const wrap = document.getElementById('wb-labels');
      if (wrap) wrap.innerHTML = '';
      _selectedTxt = null;
      // クリア後すぐにスナップショットを送信して教員側に反映
      if (wbCanvas) {
        const dataUrl = wbCanvas.toDataURL('image/jpeg', 0.7);
        set(ref(db, `sessions/${sessionId}/wb/snapshots/${studentId}`), dataUrl);
      }
    };
    window.wbSetTool = function(t) {
      if (t === 'text') {
        _wbTextMode = !_wbTextMode;
        document.querySelectorAll('#wb-toolbar .wbt').forEach(b => b.classList.remove('active'));
        const fsEl = document.getElementById('wb-font-size');
        if (_wbTextMode) {
          wbTool = 'text';
          const btn = document.getElementById('wbt-text');
          if (btn) btn.classList.add('active');
          if (fsEl) fsEl.style.display = '';
        } else {
          wbTool = 'pen';
          const penBtn = document.getElementById('wbt-pen');
          if (penBtn) penBtn.classList.add('active');
          if (fsEl) fsEl.style.display = 'none';
        }
        return;
      }
      _wbTextMode = false;
      const fsEl = document.getElementById('wb-font-size');
      if (fsEl) fsEl.style.display = 'none';
      wbTool = t;
      document.querySelectorAll('#wb-toolbar .wbt').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('wbt-' + t);
      if (btn) btn.classList.add('active');
    };
    window.wbSetFontSize = function(v) { wbFontSize = parseInt(v); };
    window.wbSetColor = el => {
      wbColor = el.dataset.color;
      document.querySelectorAll('#wb-toolbar .wbc').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    };
    window.wbSetSize = v => { wbSize = parseInt(v); };
    window.wbSetSizeBtn = function(v) {
      wbSize = parseInt(v);
      document.querySelectorAll('#wbt-thin,#wbt-mid,#wbt-thick').forEach(b => b.classList.remove('active'));
      const map = {'2':'#wbt-thin', '4':'#wbt-mid', '8':'#wbt-thick'};
      const btn = document.querySelector(map[String(wbSize)]);
      if (btn) btn.classList.add('active');
    };
    window.wbAddLabel = () => { makeTxtBox('wb-labels', wbLabels, wbColor, wbFontSize); };
    function wbRenderLabels() { /* テキストボックスはmakeTxtBoxで管理 */ }
    function wbExportWithLabels() {
      const merged = document.createElement('canvas');
      merged.width = wbCanvas.width; merged.height = wbCanvas.height;
      const ctx = merged.getContext('2d');
      ctx.drawImage(wbCanvas, 0, 0);
      burnTxtBoxes(ctx, wbLabels, wbCanvas);
      return merged.toDataURL('image/jpeg', 0.85);
    }
    let wbSnapTimer = null;
    function wbScheduleSnapshot() {
      clearTimeout(wbSnapTimer);
      wbSnapTimer = setTimeout(() => wbSendSnapshot(), 1500);
    }
    function wbSendSnapshot() {
      if (!wbCanvas) return;
      const dataUrl = wbExportWithLabels();
      set(ref(db, `sessions/${sessionId}/wb/snapshots/${studentId}`), dataUrl);
    }
    function wbSignalDrawing() {
      set(ref(db, `sessions/${sessionId}/wb/drawing/${studentId}`), true);
      setTimeout(() => set(ref(db, `sessions/${sessionId}/wb/drawing/${studentId}`), false), 2000);
    }
    window.wbSubmit = async function() {
      if (!wbCanvas) return;
      const dataUrl = wbExportWithLabels();
      await set(ref(db, `sessions/${sessionId}/wb/submissions/${studentId}`), {
        name: window.wbName || studentId, image: dataUrl, submittedAt: Date.now()
      });
      wbToast('✅ 提出しました！');
    };
    function wbApplyBgImage(dataUrl) {
      if (!wbCtx || !dataUrl) { wbInit(); }
      const img = new Image();
      img.onload = () => {
        wbInit();
        const c = wbCanvas;
        wbCtx.fillStyle = 'white';
        wbCtx.fillRect(0,0,c.width,c.height);
        const scale = Math.min(c.width/img.width, c.height/img.height);
        const x = (c.width-img.width*scale)/2;
        const y = (c.height-img.height*scale)/2;
        wbCtx.drawImage(img, x, y, img.width*scale, img.height*scale);
        wbScheduleSnapshot();
      };
      img.src = dataUrl;
    }
    function wbToast(msg) {
      const t = document.getElementById('wb-toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== アンケート =====
    let _surveyAnswered = false;

    function showSurvey(sv) {
      if (!sv || !sv.question) return;
      _surveyAnswered = false;

      const overlay = document.getElementById('survey-overlay');
      if (!overlay) return;

      // 質問文
      const qEl = document.getElementById('survey-q-text');
      if (qEl) qEl.textContent = sv.question;

      // タイプラベル・アイコン
      const lbl = document.getElementById('survey-type-label');
      const icon = document.getElementById('survey-type-icon');
      if (sv.type === 'choice') {
        if (lbl) lbl.textContent = '選択式アンケート';
        if (icon) icon.textContent = '📊';
      } else {
        if (lbl) lbl.textContent = '自由記述アンケート';
        if (icon) icon.textContent = '✏️';
      }

      // 回答エリア構築
      const area = document.getElementById('survey-body');
      if (!area) return;
      area.innerHTML = '';

      if (sv.type === 'choice') {
        // 選択肢を配列に正規化（Firebase は配列をオブジェクトに変換する場合あり）
        const choices = Array.isArray(sv.choices)
          ? sv.choices
          : Object.values(sv.choices || {});
        choices.forEach((c, i) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = `<span class="choice-label-badge">${String.fromCharCode(65+i)}</span><span>${c}</span>`;
          btn.onclick = () => {
            if (_surveyAnswered) return;
            doSubmitSurvey(c, btn, area);
          };
          area.appendChild(btn);
        });
      } else {
        // 自由記述
        const ta = document.createElement('textarea');
        ta.id = 'survey-free-text';
        ta.placeholder = '回答を入力...';
        ta.style.cssText = 'width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);font-size:15px;min-height:90px;resize:vertical;box-sizing:border-box;margin-bottom:10px;font-family:inherit;';
        area.appendChild(ta);
        const btn = document.createElement('button');
        btn.style.cssText = 'width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;';
        btn.textContent = '送信する';
        btn.onclick = () => {
          if (_surveyAnswered) return;
          const val = (document.getElementById('survey-free-text')?.value || '').trim();
          if (!val) { ta.style.borderColor='#ef4444'; ta.focus(); return; }
          doSubmitSurvey(val, btn, area);
        };
        area.appendChild(btn);
      }

      overlay.classList.add('show');
    }

    async function doSubmitSurvey(answer, triggerEl, area) {
      _surveyAnswered = true;
      try {
        await set(ref(db, `sessions/${sessionId}/surveyAnswers/${studentId}`), {
          name: window.wbName || studentId,
          answer,
          ts: Date.now()
        });
        // 回答済み表示
        area.innerHTML = '';
        const done = document.createElement('div');
        done.style.cssText = 'text-align:center;padding:20px 0;font-size:15px;color:#16a34a;font-weight:700;';
        done.innerHTML = '✅ 回答を送信しました';
        area.appendChild(done);
      } catch(e) {
        _surveyAnswered = false;
        alert('送信に失敗しました。もう一度お試しください。');
      }
    }

    function hideSurvey() {
      const overlay = document.getElementById('survey-overlay');
      if (overlay) overlay.classList.remove('show');
      _surveyAnswered = false;
    }

    // ===== グループ監視 =====
    // listenMyGroup はこの後に定義

    function handleCommand(data) {
      console.log('[CMD]', data.command, data.text || '');
      if (data.command === 'focus') {
        showFocus();
      } else if (data.command === 'unfocus') {
        hideFocus();
      } else if (data.command === 'message') {
        showMsgPopup(data.text);
      } else if (data.command === 'survey-open') {
        // onValue が自動で拾うので何もしなくてよい（念のためDB再読）
        get(ref(db, `sessions/${sessionId}/survey`)).then(snap => {
          if (snap.exists() && snap.val()?.active) showSurvey(snap.val());
        });
      } else if (data.command === 'survey-close') {
        hideSurvey();
      } else if (data.command === 'stopWatch') {
        hideWatch();
        window._watchSourceName = null;
        // 自分がsource側なら配信も停止
        stopDirectBcast();
      } else if (data.command === 'startBcast') {
        // 自分の画面を対象生徒に直接P2P送信する
        startDirectBcast(data.targets || [], data.sourceName || '');
      } else if (data.command === 'stopBcast') {
        stopDirectBcast();
      } else if (data.command === 'watchStart') {
        window._watchSourceName = data.sourceName || '生徒';
        const tv = document.getElementById('teacher-video');
        const wv = document.getElementById('watch-video');
        if (tv && wv && tv.srcObject) {
          // ontrackでteacher-videoに入ってしまっていた映像をwatch-videoへ移す
          wv.srcObject = tv.srcObject;
          tv.srcObject = null; // srcObject切り替えを先に行いAbortError防止
          document.getElementById('teacher-overlay')?.classList.remove('show');
          wv.play().catch(() => {});
          showWatch(window._watchSourceName);
        } else if (wv && wv.srcObject) {
          // 既にwatch-videoに映像あり（P2P ontrackが先に発火した場合）
          if (wv.paused) wv.play().catch(() => {});
          showWatch(window._watchSourceName);
        }
        // wv.srcObjectがなければP2P接続中 → ontrack内のshowWatch(sourceName)を待つ
      } else if (data.command === 'teacherShare') {
        console.log('[cmd] teacherShare received');
        window._teacherShareActive = true;
        window._watchSourceName = null; // watchモードをリセット
        // ontrackで既にteacher-videoに映像が来ていれば表示
        const tv = document.getElementById('teacher-video');
        if (tv && tv.srcObject) showTeacher();
      } else if (data.command === 'stopTeacherShare') {
        window._teacherShareActive = false;
        hideTeacher();
      } else if (data.command === 'wb-open') {
        wbOpen();
      } else if (data.command === 'wb-close') {
        wbClose();
      } else if (data.command === 'wb-clear') {
        wbClear();
      } else if (data.command === 'dist-img') {
        if (data.dataUrl) showDistImg(data.dataUrl);
      } else if (data.command === 'dist-img-close') {
        window.hideDistImg && window.hideDistImg();
      } else if (data.command === 'dist-img-clear') {
        window.distImgClear && window.distImgClear();
      }
    }

    // ===== 班別WBエンジン =====
    let gWbCtx = null, gWbDrawing = false, gWbSaving = false, gWbLX = 0, gWbLY = 0;
    let gWbTool = 'pen', gWbColor = '#1e293b', gWbSize = 4, gWbFontSize = 30;
    let gWbGroupId = null, gWbResetTs = 0;
    let gWbFromImg = false; // distImg経由でWBを開いた場合true
    let gWbStrokeListenerUnsub = null;
    let gWbCurrentStroke = null;

    function gWbInit() {
      const canvas = document.getElementById('group-wb-canvas');
      if (!canvas || gWbCtx) return;
      const wrap = canvas.parentElement;
      // 固定アスペクト比 16:9
      const wrapWidth = wrap.offsetWidth;
      const wrapHeight = wrap.offsetHeight;
      const wrapAspect = wrapWidth / wrapHeight;
      const targetAspect = 16 / 9;
      
      if (wrapAspect > targetAspect) {
        // ラップの方が横長 → 高さ基準
        canvas.height = wrapHeight;
        canvas.width = Math.round(wrapHeight * targetAspect);
      } else {
        // ラップの方が縦長 → 幅基準
        canvas.width = wrapWidth;
        canvas.height = Math.round(wrapWidth / targetAspect);
      }
      
      console.log('[WB初期化] キャンバスサイズ:', canvas.width, 'x', canvas.height, 'アスペクト比:', (canvas.width / canvas.height).toFixed(2));
      
      gWbCtx = canvas.getContext('2d');
      gWbCtx.fillStyle = 'white';
      gWbCtx.fillRect(0, 0, canvas.width, canvas.height);

      canvas.addEventListener('pointerdown', e => {
        if (_selectedTxt) { deselectTxt(); return; }
        if (_gWbTextMode) {
          const r2 = canvas.getBoundingClientRect();
          const xPct = (e.clientX - r2.left) / r2.width * 100;
          const yPct = (e.clientY - r2.top)  / r2.height * 100;
          const textKey = `${studentId}_txt_${Date.now()}`;
          const canvas2 = document.getElementById('group-wb-canvas');
          const actualCanvasH = canvas2 ? canvas2.height : 900;
          const textData = { uid: studentId, x: xPct, y: yPct, w: 200, text: '', color: gWbColor,
            fontSize: gWbFontSize, fontSizePct: gWbFontSize / actualCanvasH * 100,
            canvasW: canvas2 ? canvas2.width : 1600, canvasH: actualCanvasH, ts: Date.now() };
          console.log('[テキスト作成] textData:', JSON.stringify(textData));
          console.log('[テキスト作成] クリック位置 - client:', e.clientX, e.clientY, 'canvas:', r2.left, r2.top, r2.width, r2.height);
          console.log('[テキスト作成] パーセント座標:', xPct.toFixed(2), yPct.toFixed(2));
          if (gWbGroupId) {
            if (gWbIsSelectMode) {
              // 番号選択モード: 別パスに保存
              if (gWbFromImg) {
                set(ref(db, `sessions/${sessionId}/groupSelectImg/${gWbGroupId}/texts/${textKey}`), textData);
              } else {
                set(ref(db, `sessions/${sessionId}/groupSelectWB/${gWbGroupId}/texts/${textKey}`), textData);
              }
            } else {
              // 教員作成モード: 元のパス
              if (gWbFromImg) {
                set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/distImg/texts/${textKey}`), textData);
              } else {
                set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/wb/texts/${textKey}`), textData);
              }
            }
          }
          return;
        }
        gWbDrawing = true;
        canvas.setPointerCapture(e.pointerId); // ② キャンバス外に出ても追跡継続
        const r = canvas.getBoundingClientRect();
        // 座標をパーセント正規化して保存（異なる画面サイズの生徒間で正確に共有するため）
        gWbLX = (e.clientX - r.left) / r.width * 100;
        gWbLY = (e.clientY - r.top) / r.height * 100;
        const rawSize = gWbTool === 'eraser' ? gWbSize * 5 : gWbSize;
        // sizePctは実際のcanvas高さに対する割合で保存（固定値900ではなく実測値を使用）
        gWbCurrentStroke = {
          uid: studentId, tool: gWbTool,
          color: gWbTool === 'eraser' ? null : gWbColor,
          size: rawSize,
          sizePct: rawSize / canvas.height * 100,
          points: [[gWbLX, gWbLY]], ts: Date.now(),
          normalized: true,
          canvasW: canvas.width, canvasH: canvas.height
        };
      });
      canvas.addEventListener('pointermove', e => {
        if (!gWbDrawing) return;
        const r = canvas.getBoundingClientRect();
        // キャプチャ中はcanvas外の座標もクランプして受け取る
        const x = Math.max(0, Math.min(100, (e.clientX - r.left) / r.width * 100));
        const y = Math.max(0, Math.min(100, (e.clientY - r.top) / r.height * 100));
        // 描画はキャンバスのピクセル座標に変換して実行
        gWbDrawSegment(gWbLX / 100 * canvas.width, gWbLY / 100 * canvas.height, x / 100 * canvas.width, y / 100 * canvas.height, gWbTool, gWbColor, gWbSize);
        gWbLX = x; gWbLY = y;
        // 点の間引き: 直前の点から一定距離以上移動した場合のみ記録（データ量削減）
        if (gWbCurrentStroke) {
          const pts = gWbCurrentStroke.points;
          const last = pts[pts.length - 1];
          const dx = x - last[0], dy = y - last[1];
          if (dx * dx + dy * dy >= 0.25) {  // 0.5%以上移動した場合のみ追加
            pts.push([x, y]);
          }
        }
      });

      // ストロークをFirebaseに保存する共通関数
      async function gWbSaveCurrentStroke() {
        if (!gWbDrawing) return;
        // ペンを離した瞬間に描画フラグを落とす（次のストロークをすぐ開始できる）
        gWbDrawing = false;
        if (!gWbCurrentStroke || !gWbGroupId) {
          gWbCurrentStroke = null;
          return;
        }
        const stroke = gWbCurrentStroke;
        gWbCurrentStroke = null;
        const strokeKey = `${studentId}_${stroke.ts}`;
        // Firebase保存中フラグを立てて onValue による全消去を防ぐ
        gWbSaving = true;
        try {
          if (gWbIsSelectMode) {
            if (gWbFromImg) {
              await set(ref(db, `sessions/${sessionId}/groupSelectImg/${gWbGroupId}/strokes/${strokeKey}`), stroke);
            } else {
              await set(ref(db, `sessions/${sessionId}/groupSelectWB/${gWbGroupId}/strokes/${strokeKey}`), stroke);
            }
          } else {
            if (gWbFromImg) {
              await set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/distImg/strokes/${strokeKey}`), stroke);
            } else {
              await set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/wb/strokes/${strokeKey}`), stroke);
            }
          }
        } finally {
          // 保存完了後にフラグを落とす（この後 onValue が来ても安全）
          gWbSaving = false;
          gWbScheduleSnapshot();
        }
      }

      canvas.addEventListener('pointerup', gWbSaveCurrentStroke);
      // pointercancel時もストロークを保存して欠損を防ぐ（② 素早い描画の欠損対策）
      canvas.addEventListener('pointercancel', gWbSaveCurrentStroke);
      // pointerleaveはsetPointerCaptureにより通常発生しないが、念のため保存処理を行う
      canvas.addEventListener('pointerleave', e => {
        if (e.buttons === 0) gWbSaveCurrentStroke(); // ボタンが離れていれば保存
      });
    }

    function gWbDrawSegment(x1, y1, x2, y2, tool, color, size) {
      if (!gWbCtx) return;
      gWbCtx.beginPath();
      gWbCtx.moveTo(x1, y1);
      gWbCtx.lineTo(x2, y2);
      gWbCtx.lineCap = 'round'; gWbCtx.lineJoin = 'round';
      gWbCtx.globalCompositeOperation = 'source-over';
      gWbCtx.strokeStyle = (tool === 'eraser') ? 'white' : color;
      gWbCtx.lineWidth = (tool === 'eraser') ? size * 5 : size;
      gWbCtx.stroke();
    }

    function gWbReplayStrokes(strokes) {
      if (!gWbCtx) return;
      // 描画中またはFirebase保存中は全消去再描画を行わない（自分の線が消えるのを防ぐ）
      if (gWbDrawing || gWbSaving) return;
      const canvas = document.getElementById('group-wb-canvas');
      const drawStrokes = () => {
        // 画像ロード完了後も描画中・保存中になっていたら上書きしない
        if (gWbDrawing || gWbSaving) return;
        if (!strokes) return;
        Object.values(strokes).sort((a, b) => a.ts - b.ts).forEach(stroke => {
          const pts = stroke.points;
          if (!pts || pts.length < 2) return;
          let scaledSize = stroke.size;
          if (stroke.sizePct) {
            scaledSize = Math.max(0.5, stroke.sizePct / 100 * canvas.height);
          } else if (stroke.normalized && stroke.canvasW && stroke.canvasH) {
            const scaleX = canvas.width  / stroke.canvasW;
            const scaleY = canvas.height / stroke.canvasH;
            scaledSize = Math.max(0.5, stroke.size * Math.sqrt(scaleX * scaleY));
          }
          for (let i = 1; i < pts.length; i++) {
            let x1 = pts[i-1][0], y1 = pts[i-1][1];
            let x2 = pts[i][0],   y2 = pts[i][1];
            if (stroke.normalized) {
              x1 = x1 / 100 * canvas.width;  y1 = y1 / 100 * canvas.height;
              x2 = x2 / 100 * canvas.width;  y2 = y2 / 100 * canvas.height;
            }
            gWbDrawSegment(x1, y1, x2, y2, stroke.tool, stroke.color, scaledSize);
          }
        });
      };
      gWbCtx.fillStyle = 'white';
      gWbCtx.fillRect(0, 0, canvas.width, canvas.height);
      if (gWbBgImage) {
        const img = new Image();
        img.onload = () => {
          const imgAspect = img.width / img.height;
          const canvasAspect = canvas.width / canvas.height;
          let drawWidth, drawHeight, offsetX = 0, offsetY = 0;
          if (imgAspect > canvasAspect) {
            drawWidth = canvas.width;
            drawHeight = canvas.width / imgAspect;
            offsetY = (canvas.height - drawHeight) / 2;
          } else {
            drawHeight = canvas.height;
            drawWidth = canvas.height * imgAspect;
            offsetX = (canvas.width - drawWidth) / 2;
          }
          gWbCtx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
          drawStrokes();
        };
        img.onerror = () => drawStrokes();
        img.src = gWbBgImage;
      } else {
        drawStrokes();
      }
    }

    let gWbTextListenerUnsub = null;
    let _lastStrokesSnapshot = null; // 前回のストロークスナップショットを保持

    function gWbListenStrokes(groupId, pathOverride) {
      if (gWbStrokeListenerUnsub) { gWbStrokeListenerUnsub(); gWbStrokeListenerUnsub = null; }
      _lastStrokesSnapshot = null;
      const strokesPath = pathOverride || `sessions/${sessionId}/groups/${groupId}/wb/strokes`;
      gWbStrokeListenerUnsub = onValue(ref(db, strokesPath), snap => {
        if (!gWbCtx) return;
        const newStrokes = snap.exists() ? snap.val() : null;

        // 描画中またはFirebase保存中は更新をスキップ（自分の線が消えるのを防ぐ）
        if (gWbDrawing || gWbSaving) {
          _lastStrokesSnapshot = newStrokes;
          return;
        }

        // ストロークが減った（消去操作）または初回 → 全体再描画
        const prevCount = Object.keys(_lastStrokesSnapshot || {}).length;
        const newCount  = Object.keys(newStrokes  || {}).length;
        const needsFullRedraw = !_lastStrokesSnapshot || newStrokes === null || newCount < prevCount;

        if (needsFullRedraw) {
          gWbReplayStrokes(newStrokes);
        } else {
          // 増分更新: 新しいストロークのみ描画
          const oldKeys = new Set(Object.keys(_lastStrokesSnapshot || {}));
          const canvas = document.getElementById('group-wb-canvas');
          if (!canvas) { _lastStrokesSnapshot = newStrokes; return; }
          Object.entries(newStrokes || {}).forEach(([key, stroke]) => {
            if (oldKeys.has(key)) return;
            const pts = stroke.points;
            if (!pts || pts.length < 2) return;
            let scaledSize = stroke.size;
            if (stroke.sizePct) {
              scaledSize = Math.max(0.5, stroke.sizePct / 100 * canvas.height);
            } else if (stroke.normalized && stroke.canvasW && stroke.canvasH) {
              const scaleX = canvas.width  / stroke.canvasW;
              const scaleY = canvas.height / stroke.canvasH;
              scaledSize = Math.max(0.5, stroke.size * Math.sqrt(scaleX * scaleY));
            }
            for (let i = 1; i < pts.length; i++) {
              let x1 = pts[i-1][0], y1 = pts[i-1][1];
              let x2 = pts[i][0],   y2 = pts[i][1];
              if (stroke.normalized) {
                x1 = x1 / 100 * canvas.width;  y1 = y1 / 100 * canvas.height;
                x2 = x2 / 100 * canvas.width;  y2 = y2 / 100 * canvas.height;
              }
              gWbDrawSegment(x1, y1, x2, y2, stroke.tool, stroke.color, scaledSize);
            }
          });
        }

        _lastStrokesSnapshot = newStrokes;
      });
    }

    function gWbListenTexts(groupId, pathOverride) {
      if (gWbTextListenerUnsub) { gWbTextListenerUnsub(); gWbTextListenerUnsub = null; }
      const textsPath = pathOverride || (gWbFromImg
        ? `sessions/${sessionId}/groups/${groupId}/distImg/texts`
        : `sessions/${sessionId}/groups/${groupId}/wb/texts`);
      gWbTextListenerUnsub = onValue(ref(db, textsPath), snap => {
        renderGWbTexts(snap.exists() ? snap.val() : {});
      });
    }

    function renderGWbTexts(textsObj) {
      const container = document.getElementById('group-wb-labels');
      if (!container) return;
      const incomingKeys = new Set(Object.keys(textsObj));
      container.querySelectorAll('[data-text-key]').forEach(el => {
        if (!incomingKeys.has(el.dataset.textKey)) el.remove();
      });
      Object.entries(textsObj).forEach(([key, td]) => {
        const isMine = td.uid === studentId;
        const existing = container.querySelector(`[data-text-key="${key}"]`);
        if (isMine) {
          if (!existing) _createOwnTextBox(container, key, td);
        } else {
          if (existing) {
            const canvas = document.getElementById('group-wb-canvas');
            const canvasRect = canvas.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            // キャンバス基準のパーセンテージ → ピクセル → コンテナ基準のパーセンテージ
            const canvasX = (td.x / 100) * canvasRect.width;
            const canvasY = (td.y / 100) * canvasRect.height;
            const containerX = ((canvasRect.left - containerRect.left + canvasX) / containerRect.width) * 100;
            const containerY = ((canvasRect.top - containerRect.top + canvasY) / containerRect.height) * 100;
            
            existing.style.left = containerX + '%';
            existing.style.top  = containerY + '%';
            existing.style.width = (td.w || 200) + 'px';
            const span = existing.querySelector('.gwb-peer-text');
            if (span) {
              span.textContent = td.text || '';
              span.style.color = td.color || '#1e293b';
              // フォントサイズを更新
              const _cvs = document.getElementById('group-wb-canvas');
              const _cH = _cvs?.height || 900;
              let _fs;
              if (td.fontSizePct) {
                _fs = Math.max(8, Math.round(td.fontSizePct / 100 * _cH));
              } else if (td.canvasH) {
                _fs = Math.max(8, Math.round((td.fontSize || 16) / td.canvasH * _cH));
              } else {
                _fs = td.fontSize || 16;
              }
              span.style.fontSize = _fs + 'px';
            }
          } else {
            _createPeerTextBox(container, key, td);
          }
        }
      });
    }

    function _createOwnTextBox(container, key, td) {
      const canvas = document.getElementById('group-wb-canvas');
      const canvasRect = canvas.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      
      // キャンバス基準のパーセンテージ → ピクセル → コンテナ基準のパーセンテージ
      const canvasX = (td.x / 100) * canvasRect.width;
      const canvasY = (td.y / 100) * canvasRect.height;
      const containerX = ((canvasRect.left - containerRect.left + canvasX) / containerRect.width) * 100;
      const containerY = ((canvasRect.top - containerRect.top + canvasY) / containerRect.height) * 100;
      
      const wrap = document.createElement('div');
      wrap.className = 'txt-box-wrap selected';
      wrap.dataset.textKey = key;
      wrap.style.cssText = `position:absolute;left:${containerX}%;top:${containerY}%;width:${td.w||200}px;`;
      console.log('[生徒 テキストボックス作成] canvas基準:', td.x.toFixed(2), '%,', td.y.toFixed(2), '% → container基準:', containerX.toFixed(2), '%,', containerY.toFixed(2), '%');
      console.log('[生徒 テキストボックス作成] canvasRect:', canvasRect.left, canvasRect.top, canvasRect.width, canvasRect.height);
      console.log('[生徒 テキストボックス作成] containerRect:', containerRect.left, containerRect.top, containerRect.width, containerRect.height);
      const ta = document.createElement('textarea');
      ta.className = 'txt-box-input'; ta.placeholder = 'テキスト入力';
      ta.style.color = td.color || gWbColor;
      // フォントサイズを現在のキャンバス高さにスケール
      let fontSize;
      if (td.fontSizePct && canvas) {
        // fontSizePctがある場合は、現在のキャンバス高さに対する割合で計算
        fontSize = Math.round(td.fontSizePct / 100 * canvas.height);
      } else if (td.canvasH && canvas) {
        // 旧形式: 元のcanvasHに対する割合を現在のキャンバスにスケール
        fontSize = Math.round((td.fontSize || 16) / td.canvasH * canvas.height);
      } else {
        fontSize = td.fontSize || 16;
      }
      ta.style.fontSize = fontSize + 'px';
      ta.value = td.text || ''; ta.rows = 2;
      const delBtn = document.createElement('button'); delBtn.className = 'txt-del-btn'; delBtn.innerHTML = '✕';
      const resizeHandle = document.createElement('div'); resizeHandle.className = 'txt-resize-handle'; resizeHandle.innerHTML = '⤡';
      const doneBtn = document.createElement('button'); doneBtn.className = 'txt-done-btn'; doneBtn.innerHTML = '✓ 完了';
      wrap.appendChild(ta); wrap.appendChild(delBtn); wrap.appendChild(resizeHandle); wrap.appendChild(doneBtn);
      container.appendChild(wrap);
      function enterMoveMode() { selectTxt(wrap); wrap.classList.add('selected'); wrap.classList.remove('edit-mode'); }
      function enterEditMode() { selectTxt(wrap); wrap.classList.add('selected','edit-mode'); ta.focus(); const l=ta.value.length; ta.setSelectionRange(l,l); }
      let tapTimer=null, tapCount=0;
      wrap.addEventListener('pointerdown', e => {
        if (e.target===delBtn||e.target===resizeHandle||e.target===doneBtn) return;
        if (wrap.classList.contains('edit-mode') && e.target===ta) return;
        e.preventDefault(); tapCount++;
        if (tapCount===1) { tapTimer=setTimeout(()=>{ tapCount=0; enterMoveMode(); },250); }
        else if (tapCount>=2) { clearTimeout(tapTimer); tapCount=0; enterEditMode(); }
      });
      let moveDrag=false,moveSX,moveSY,moveOX,moveOY;
      wrap.addEventListener('pointerdown', e => {
        if (e.target===delBtn||e.target===resizeHandle||e.target===doneBtn) return;
        if (wrap.classList.contains('edit-mode')) return;
        moveDrag=true; wrap.setPointerCapture(e.pointerId);
        moveSX=e.clientX; moveSY=e.clientY;
        moveOX=parseFloat(wrap.style.left)||0; moveOY=parseFloat(wrap.style.top)||0;
      });
      wrap.addEventListener('pointermove', e => {
        if (!moveDrag) return;
        const pW=wrap.parentElement?.offsetWidth||300, pH=wrap.parentElement?.offsetHeight||200;
        const newX=Math.max(0,Math.min(100-wrap.offsetWidth/pW*100, moveOX+(e.clientX-moveSX)/pW*100));
        const newY=Math.max(0,Math.min(100-wrap.offsetHeight/pH*100, moveOY+(e.clientY-moveSY)/pH*100));
        wrap.style.left=newX+'%'; wrap.style.top=newY+'%';
      });
      wrap.addEventListener('pointerup', () => { if(moveDrag){moveDrag=false; _saveTextToFb(key,wrap,ta);} });
      wrap.addEventListener('pointercancel', () => { moveDrag=false; });
      let resDrag=false,resSX,resSY,resOW,resOH;
      resizeHandle.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); resDrag=true; resizeHandle.setPointerCapture(e.pointerId); resSX=e.clientX; resSY=e.clientY; resOW=wrap.offsetWidth; resOH=ta.offsetHeight; });
      resizeHandle.addEventListener('pointermove', e => { if(!resDrag)return; wrap.style.width=Math.max(80,resOW+e.clientX-resSX)+'px'; ta.style.height=Math.max(40,resOH+e.clientY-resSY)+'px'; });
      resizeHandle.addEventListener('pointerup', () => { if(resDrag){resDrag=false; _saveTextToFb(key,wrap,ta);} });
      resizeHandle.addEventListener('pointercancel', () => { resDrag=false; });
      delBtn.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); });
      delBtn.addEventListener('click', e => { e.stopPropagation(); wrap.remove(); if(gWbGroupId) {
        if (gWbIsSelectMode) {
          // 番号選択モード: 別パス
          if (gWbFromImg) set(ref(db,`sessions/${sessionId}/groupSelectImg/${gWbGroupId}/texts/${key}`),null);
          else set(ref(db,`sessions/${sessionId}/groupSelectWB/${gWbGroupId}/texts/${key}`),null);
        } else {
          // 教員作成モード: 元のパス
          if (gWbFromImg) set(ref(db,`sessions/${sessionId}/groups/${gWbGroupId}/distImg/texts/${key}`),null);
          else set(ref(db,`sessions/${sessionId}/groups/${gWbGroupId}/wb/texts/${key}`),null);
        }
      }});
      doneBtn.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); });
      doneBtn.addEventListener('click', e => { e.stopPropagation(); wrap.classList.remove('edit-mode'); wrap.classList.add('selected'); ta.blur(); });
      let inputTimer=null;
      ta.addEventListener('input', () => { clearTimeout(inputTimer); inputTimer=setTimeout(()=>_saveTextToFb(key,wrap,ta),400); });
      selectTxt(wrap); setTimeout(()=>ta.focus(),50);
    }

    function _createPeerTextBox(container, key, td) {
      const canvas = document.getElementById('group-wb-canvas');
      const canvasRect = canvas.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      
      // キャンバス基準のパーセンテージ → ピクセル → コンテナ基準のパーセンテージ
      const canvasX = (td.x / 100) * canvasRect.width;
      const canvasY = (td.y / 100) * canvasRect.height;
      const containerX = ((canvasRect.left - containerRect.left + canvasX) / containerRect.width) * 100;
      const containerY = ((canvasRect.top - containerRect.top + canvasY) / containerRect.height) * 100;
      
      const div = document.createElement('div');
      div.dataset.textKey = key;
      div.style.cssText = `position:absolute;left:${containerX}%;top:${containerY}%;width:${td.w||200}px;pointer-events:none;z-index:19;`;
      const span = document.createElement('span');
      span.className = 'gwb-peer-text';
      const _peerCH = canvas?.height || 500;
      let _peerFs;
      if (td.fontSizePct) {
        _peerFs = Math.max(8, Math.round(td.fontSizePct / 100 * _peerCH));
      } else if (td.canvasH) {
        _peerFs = Math.max(8, Math.round((td.fontSize || 16) / td.canvasH * _peerCH));
      } else {
        _peerFs = td.fontSize || 16;
      }
      span.style.cssText = `display:block;font:bold ${_peerFs}px 'Noto Sans JP',sans-serif;color:${td.color||'#1e293b'};white-space:pre-wrap;word-break:break-all;background:transparent;padding:4px 6px;`;
      span.textContent = td.text || '';
      div.appendChild(span); container.appendChild(div);
    }

    function _saveTextToFb(key, wrap, ta) {
      if (!gWbGroupId) return;
      const canvas = document.getElementById('group-wb-canvas');
      const container = document.getElementById('group-wb-labels');
      if (!canvas || !container) return;
      
      const canvasRect = canvas.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      
      // container基準のパーセンテージ → canvas基準のパーセンテージに戻す
      const containerX = parseFloat(wrap.style.left) || 0;
      const containerY = parseFloat(wrap.style.top) || 0;
      
      // container基準のパーセント → ピクセル
      const containerPx = containerX / 100 * containerRect.width;
      const containerPy = containerY / 100 * containerRect.height;
      
      // キャンバスの左上からの相対ピクセル
      const canvasPx = containerPx - (canvasRect.left - containerRect.left);
      const canvasPy = containerPy - (canvasRect.top - containerRect.top);
      
      // canvas基準のパーセンテージ
      const canvasX = (canvasPx / canvasRect.width) * 100;
      const canvasY = (canvasPy / canvasRect.height) * 100;
      
      const _fs = parseInt(ta.style.fontSize) || gWbFontSize;
      // fontSizePct は実際の canvas 高さ基準で保存する（固定値900ではなく実測値）
      const textData = { uid: studentId, x: canvasX, y: canvasY,
        w: wrap.offsetWidth, text: ta.value, color: ta.style.color || gWbColor,
        fontSize: _fs, fontSizePct: _fs / canvasRect.height * 100,
        canvasW: canvasRect.width, canvasH: canvasRect.height, ts: Date.now() };
      if (gWbIsSelectMode) {
        // 番号選択モード: 別パス
        if (gWbFromImg) {
          set(ref(db, `sessions/${sessionId}/groupSelectImg/${gWbGroupId}/texts/${key}`), textData);
        } else {
          set(ref(db, `sessions/${sessionId}/groupSelectWB/${gWbGroupId}/texts/${key}`), textData);
        }
      } else {
        // 教員作成モード: 元のパス
        if (gWbFromImg) {
          set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/distImg/texts/${key}`), textData);
        } else {
          set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/wb/texts/${key}`), textData);
        }
      }
      gWbScheduleSnapshot();
    }

    let gWbSnapTimer = null;
    function gWbScheduleSnapshot() {
      clearTimeout(gWbSnapTimer);
      gWbSnapTimer = setTimeout(async () => {
        const canvas = document.getElementById('group-wb-canvas');
        if (!canvas || !gWbGroupId) return;
        const merged = document.createElement('canvas');
        merged.width = canvas.width; merged.height = canvas.height;
        const ctx = merged.getContext('2d');
        ctx.drawImage(canvas, 0, 0);
        const labels = document.getElementById('group-wb-labels');
        if (labels) {
          const pW = canvas.offsetWidth  || canvas.width;
          const pH = canvas.offsetHeight || canvas.height;
          const scaleX = canvas.width  / pW;
          const scaleY = canvas.height / pH;
          // 自分のテキストボックス（.txt-box-wrap）
          labels.querySelectorAll('.txt-box-wrap').forEach(wrap => {
            const ta = wrap.querySelector('.txt-box-input');
            if (!ta || !ta.value) return;
            const xPct = parseFloat(wrap.style.left) || 0;
            const yPct = parseFloat(wrap.style.top)  || 0;
            const xPx  = xPct / 100 * pW * scaleX;
            const yPx  = yPct / 100 * pH * scaleY;
            const fsPx = (parseInt(ta.style.fontSize) || 20) * scaleY;
            const lineH = fsPx * 1.4;
            const padLeft = 8 * scaleX;
            const padTop  = 6 * scaleY;
            ctx.save();
            ctx.font = `bold ${fsPx}px 'Noto Sans JP', sans-serif`;
            ctx.fillStyle = ta.style.color || '#1e293b';
            const maxW = Math.max(wrap.offsetWidth * scaleX - padLeft * 2, fsPx * 2);
            const lines = _wrapTextToLines(ctx, ta.value, maxW);
            lines.forEach((line, i) => {
              ctx.fillText(line, xPx + padLeft, yPx + padTop + fsPx + i * lineH);
            });
            ctx.restore();
          });
          // 他のメンバーのテキスト（.gwb-peer-text）
          labels.querySelectorAll('[data-text-key]:not(.txt-box-wrap)').forEach(div => {
            const span = div.querySelector('.gwb-peer-text');
            if (!span || !span.textContent) return;
            const xPct = parseFloat(div.style.left) || 0;
            const yPct = parseFloat(div.style.top)  || 0;
            const xPx  = xPct / 100 * pW * scaleX;
            const yPx  = yPct / 100 * pH * scaleY;
            const fsPx = (parseInt(span.style.fontSize) || 20) * scaleY;
            const lineH = fsPx * 1.4;
            const padLeft = 8 * scaleX;
            const padTop  = 4 * scaleY;
            ctx.save();
            ctx.font = `bold ${fsPx}px 'Noto Sans JP', sans-serif`;
            ctx.fillStyle = span.style.color || '#1e293b';
            const maxW = Math.max(div.offsetWidth * scaleX - padLeft * 2, fsPx * 2);
            const lines = _wrapTextToLines(ctx, span.textContent, maxW);
            lines.forEach((line, i) => {
              ctx.fillText(line, xPx + padLeft, yPx + padTop + fsPx + i * lineH);
            });
            ctx.restore();
          });
        }
        const dataUrl = merged.toDataURL('image/jpeg', 0.6);
        await set(ref(db, `sessions/${sessionId}/groups/${gWbGroupId}/wb/snapshots/${studentId}`), dataUrl);
      }, 1000);
    }

    async function selectGroup(gid) {
      const { ref, set, get, remove } = window.FB;
      
      console.log('[GroupSelect] 班選択:', gid);
      // 新しい班を選択したら解散フラグと承認フラグをリセット
      myGroupSelectWasDissolved = false;
      myGroupSelectWasApproved = false;
      
      // 既存の選択を削除（他の班から移動する場合）
      const allGroupsSnap = await get(ref(db, `sessions/${sessionId}/groupsSelect`));
      if (allGroupsSnap.exists()) {
        const promises = [];
        allGroupsSnap.forEach(child => {
          if (child.key === 'active') return;

          if (g.members && g.members[studentId]) {
            promises.push(remove(ref(db, `sessions/${sessionId}/groupsSelect/${child.key}/members/${studentId}`)));
          }
        });
        await Promise.all(promises);
      }
      
      // 新しい班に参加（pending状態で）
      await set(ref(db, `sessions/${sessionId}/groupsSelect/${gid}/members/${studentId}`), 'pending');

      myGroupSelectStatus = 'pending';

      return `${num}班`;
    }
    
    function setupGroupSelectListeners(groupId) {
      const { ref, onValue } = window.FB;
      
      // 既存のリスナーを解除
      if (_gsWbUnsub) { _gsWbUnsub(); _gsWbUnsub = null; }
      if (_gsImgUnsub) { _gsImgUnsub(); _gsImgUnsub = null; }
      if (_gsMsgUnsub) { _gsMsgUnsub(); _gsMsgUnsub = null; }
      
      _gsWbActive = false;  // リスナー再設定時はリセット
      
      // WBの監視
      const wbPath = `sessions/${sessionId}/groupSelectWB/${groupId}`;
      console.log('[WB監視] 監視パス:', wbPath);
      _gsWbUnsub = onValue(ref(db, wbPath), wbSnap => {
        const now = new Date().toISOString().substr(11, 12);  // HH:MM:SS.mmm
        console.log(`[WB監視 ${now}] データ受信 - exists:`, wbSnap.exists(), 'val:', wbSnap.val());
        
        // データが存在しない場合は何もしない（WBが配布されていない）
        if (!wbSnap.exists()) {
          console.log('[WB監視] WBデータなし - 配布待ち');
          // WBが開いていたら閉じる
          if (_gsWbActive) {
            console.log('[WB監視] WBを閉じる（データ削除された）');
            _gsWbActive = false;
            gWbClose();
          }
          return;
        }
        
        const wbData = wbSnap.val();
        // activeフラグがfalseの場合、またはactiveがなくstrokesもtextsもない場合は閉じる
        // ただし、activeがなくてもstrokesやtextsがあれば有効なWBとして扱う（書き込み中の状態）
        const hasContent = wbData.strokes || wbData.texts;
        const isActive = wbData.active === true || hasContent;
        
        console.log('[WB監視] active:', wbData.active, 'hasContent:', hasContent, 'isActive:', isActive);
        
        if (!isActive) {
          console.log('[WB監視] 非アクティブ - WBを閉じる');
          if (_gsWbActive) {
            _gsWbActive = false;
            gWbClose();
          }
          return;
        }
        
        console.log('[WB監視] _gsWbActive:', _gsWbActive, 'gWbGroupId:', gWbGroupId, 'groupId:', groupId, 'gWbFromImg:', gWbFromImg);
        // WBが既に開いている場合は何もしない（書き込み中にリセットされるのを防ぐ）
        if (_gsWbActive && gWbGroupId === groupId && !gWbFromImg) {
          console.log('[WB監視] 既に開いているのでスキップ');
          return;
        }
        console.log('[WB監視] WBを開く');
        _gsWbActive = true;
        gWbFromImg = false;
        gWbOpen(groupId, wbData, true); // 第3引数でgroupsSelectモードを示す
      });
      
      // 画像配布の監視
      _gsImgUnsub = onValue(ref(db, `sessions/${sessionId}/groupSelectImg/${groupId}`), imgSnap => {
        if (!imgSnap.exists()) {
          gWbBgImage = null;
          if (gWbFromImg) { gWbClose(); gWbFromImg = false; }
          return;
        }
        const imgData = imgSnap.val();
        if (imgData.active && imgData.dataUrl) {
          if (!gWbGroupId || gWbGroupId !== groupId) {
            gWbFromImg = true;
            gWbBgImage = imgData.dataUrl;
            gWbOpen(groupId, { instruction: '画像に書き込みましょう', _skipReset: true }, true);
          } else {
            gWbSetBgImage(imgData.dataUrl);
          }
        } else if (!imgData.active) {
          gWbBgImage = null;
          if (gWbFromImg) { gWbClose(); gWbFromImg = false; }
          else gWbSetBgImage(null);
        }
      });
      
      // メッセージの監視
      let _lastMsgTs = 0;
      _gsMsgUnsub = onValue(ref(db, `sessions/${sessionId}/groupsSelect/${groupId}/message`), msgSnap => {
        if (!msgSnap.exists()) return;
        const msg = msgSnap.val();
        if (msg.ts && msg.ts > _lastMsgTs) {
          _lastMsgTs = msg.ts;
          showMsgPopup(msg.text);
        }
      });
    }


  } // end main
  main();

</script>
</body>
