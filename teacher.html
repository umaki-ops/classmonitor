<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業モニター｜先生用</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:#1e293b;--accent:#3b82f6;--accent2:#06b6d4;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#7c3aed;--text:#e2e8f0;--muted:#64748b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .logo{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;white-space:nowrap;}
  .logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .hcenter{display:flex;gap:5px;flex:1;margin:0 10px;flex-wrap:wrap;align-items:center;}
  .hright{display:flex;align-items:center;gap:7px;}
  .status-bar{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .btn{padding:5px 11px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:white;}.btn-primary:hover{background:#2563eb;}
  .btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:var(--red);color:white;}.btn-danger:hover{background:#dc2626;}
  .btn-focus{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;}
  .btn-share{background:linear-gradient(135deg,#0891b2,#0e7490);color:white;}
  .btn-survey{background:linear-gradient(135deg,#d97706,#b45309);color:white;}
  .btn-wb{background:linear-gradient(135deg,#059669,#047857);color:white;}
  .hdiv{width:1px;height:20px;background:var(--border);margin:0 2px;}
  .hlabel{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
  .main{position:relative;z-index:1;padding:14px;max-width:1600px;margin:0 auto;}

  /* Setup */
  #setup-panel{max-width:520px;margin:50px auto;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:34px;text-align:center;}
  #setup-panel h2{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  #setup-panel p{color:var(--muted);margin-bottom:24px;line-height:1.6;font-size:13px;}
  .ig{margin-bottom:11px;text-align:left;}
  .ig label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
  .ig input{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;}
  .ig input:focus{border-color:var(--accent);}

  /* URL box */
  #share-box{display:none;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:11px;}
  .share-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .url-row{display:flex;gap:6px;align-items:center;}
  .url-display{flex:1;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .copy-btn{padding:6px 11px;background:var(--accent);color:white;border:none;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:all 0.2s;}
  .copy-btn.copied{background:var(--green);}

  /* Control bar */
  #control-bar{display:none;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px;}
  .stats{display:flex;gap:14px;}
  .stat{display:flex;flex-direction:column;gap:1px;}
  .stat-value{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;color:var(--accent);}
  .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}

  /* View tabs */
  .view-tabs{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);width:fit-content;}
  .view-tab{padding:7px 16px;background:transparent;border:none;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .view-tab.active{background:var(--accent);color:white;}

  /* Student grid */
  #grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
  #grid.view-wb{grid-template-columns:repeat(4,1fr);}
  .student-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;}
  .student-card:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,0.4);}
  .student-card.focused{border-color:var(--purple);}
  .card-header{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .student-info{display:flex;align-items:center;gap:7px;min-width:0;flex:1;}
  .avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  .avatar-ph{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
  .sname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px;}
  .semail{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .share-type{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;flex-shrink:0;}
  .st-ok{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
  .st-warn{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
  .badge{padding:2px 6px;border-radius:20px;font-size:9px;font-weight:600;flex-shrink:0;}
  .badge-live{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
  .badge-waiting{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3);}
  .badge-focused{background:rgba(124,58,237,0.2);color:#a78bfa;border:1px solid rgba(124,58,237,0.4);}

  /* Screen area */
  .screen-area{position:relative;background:#000;aspect-ratio:16/9;overflow:hidden;cursor:pointer;}
  .screen-area video{width:100%;height:100%;object-fit:contain;display:none;}
  .screen-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--surface2);}
  .screen-ph-icon{font-size:20px;opacity:0.3;}
  .screen-ph-text{font-size:10px;color:var(--muted);}

  /* Whiteboard area (replaces screen-area in wb view) */
  .wb-area{position:relative;background:white;aspect-ratio:4/3;overflow:hidden;cursor:pointer;}
  .wb-canvas-preview{width:100%;height:100%;object-fit:contain;display:block;}
  .wb-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#f8f9fa;}
  .wb-ph-icon{font-size:20px;opacity:0.3;}
  .wb-ph-text{font-size:10px;color:var(--muted);}
  /* Submitted badge on wb */
  .wb-submitted-badge{position:absolute;top:6px;right:6px;background:var(--green);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;}
  /* Drawing indicator */
  .wb-drawing-dot{position:absolute;top:6px;left:6px;width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;}

  .card-footer{padding:6px 10px;display:flex;align-items:center;justify-content:space-between;gap:4px;}
  .jtime{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .card-actions{display:flex;gap:3px;}
  .icon-btn{height:21px;padding:0 6px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:2px;font-size:10px;font-family:'Noto Sans JP',sans-serif;font-weight:600;transition:all 0.2s;white-space:nowrap;}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);}
  .icon-btn.af{border-color:var(--purple);color:#a78bfa;background:rgba(124,58,237,0.1);}
  #empty-state{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);}
  #empty-state .ei{font-size:34px;margin-bottom:10px;opacity:0.3;}

  /* Whiteboard control bar */
  #wb-controls{display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px;}
  .wb-ctrl-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
  .wb-input{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;flex:1;min-width:200px;}
  .wb-input:focus{border-color:var(--accent);}
  .wb-stats{display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .wb-stat{font-size:11px;color:var(--muted);}
  .wb-stat span{color:var(--accent);font-weight:700;font-family:'JetBrains Mono',monospace;}

  /* Fullscreen */
  #fs-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.97);flex-direction:column;}
  #fs-overlay.show{display:flex;}
  .fs-header{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(17,24,39,0.9);gap:8px;flex-wrap:wrap;}
  .fs-sname{font-size:14px;font-weight:700;}
  .fs-actions{display:flex;gap:5px;flex-wrap:wrap;}
  #fs-video{flex:1;width:100%;object-fit:contain;background:#000;}
  /* WB fullscreen */
  #fs-wb-overlay{display:none;position:fixed;inset:0;z-index:1000;background:white;flex-direction:column;}
  #fs-wb-overlay.show{display:flex;}
  .fs-wb-header{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;background:#f8f9fa;border-bottom:1px solid #dee2e6;gap:8px;}
  .fs-wb-name{font-size:14px;font-weight:700;color:#1e293b;}
  #fs-wb-img{flex:1;width:100%;object-fit:contain;background:white;}

  /* Survey */
  #survey-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:20px;}
  #survey-panel.show{display:flex;}
  .survey-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;}
  .survey-box h3{font-size:17px;font-weight:700;margin-bottom:14px;}
  .survey-tabs{display:flex;margin-bottom:18px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .survey-tab{flex:1;padding:8px;background:transparent;border:none;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .survey-tab.active{background:var(--accent);color:white;}
  .si{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
  .si:focus{border-color:var(--accent);}
  .flabel{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px;display:block;}
  .choice-row{display:flex;gap:7px;align-items:center;margin-bottom:7px;}
  .choice-row input{flex:1;}
  .clabel{font-size:12px;color:var(--muted);width:18px;font-weight:600;}
  .add-ch{background:transparent;border:1px dashed var(--border);border-radius:7px;color:var(--muted);padding:6px 11px;cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif;width:100%;transition:all 0.2s;margin-top:4px;}
  .add-ch:hover{border-color:var(--accent);color:var(--accent);}
  .rm-ch{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;}
  .sactions{display:flex;gap:7px;margin-top:14px;justify-content:flex-end;}

  /* Results */
  #results-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:20px;}
  #results-panel.show{display:flex;}
  .results-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;}
  .results-box h3{font-size:16px;font-weight:700;margin-bottom:5px;}
  .results-q{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5;padding:10px 12px;background:var(--surface2);border-radius:8px;}
  .bar-row{margin-bottom:13px;}
  .bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;font-weight:600;}
  .bar-count{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .bar-track{height:32px;background:var(--surface2);border-radius:7px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:7px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:white;}
  .bar-voters{font-size:10px;color:var(--muted);margin-top:2px;}
  .bar-voters.hidden{display:none;}
  .free-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;}
  .free-text{font-size:14px;line-height:1.5;margin-bottom:3px;}
  .free-name{font-size:11px;color:var(--muted);}
  .free-name.hidden{display:none;}
  .ractions{display:flex;gap:7px;margin-top:14px;justify-content:space-between;align-items:center;flex-wrap:wrap;}
  .bc0{background:linear-gradient(90deg,#3b82f6,#2563eb);}
  .bc1{background:linear-gradient(90deg,#10b981,#059669);}
  .bc2{background:linear-gradient(90deg,#f59e0b,#d97706);}
  .bc3{background:linear-gradient(90deg,#8b5cf6,#7c3aed);}

  /* Msg modal */
  #msg-modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;}
  #msg-modal.show{display:flex;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:400px;margin:20px;}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:4px;}
  .modal-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .modal-ta{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:75px;}
  .modal-ta:focus{border-color:var(--accent);}
  .mactions{display:flex;gap:7px;margin-top:11px;justify-content:flex-end;}
  .qmsgs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
  .qmb{padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:10px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif;}
  .qmb:hover{border-color:var(--accent);color:var(--accent);}
  .toast{position:fixed;bottom:16px;right:16px;z-index:3000;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:9px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">👁</div><span>ClassMonitor</span></div>
  <div class="hcenter" id="hactions" style="display:none;">
    <span class="hlabel">全体:</span>
    <button class="btn btn-focus" onclick="broadcastFocus()">🎯 全員集中</button>
    <button class="btn btn-outline" onclick="broadcastUnfocus()">✅ 解除</button>
    <div class="hdiv"></div>
    <span class="hlabel">先生画面:</span>
    <button class="btn btn-share" id="tshare-btn" onclick="toggleTeacherShare()">📺 画面を共有</button>
    <div class="hdiv"></div>
    <span class="hlabel">アンケート:</span>
    <button class="btn btn-survey" onclick="openSurvey('choice')">📊 選択式</button>
    <button class="btn btn-survey" onclick="openSurvey('free')">✏️ 自由記述</button>
    <div class="hdiv"></div>
    <button class="btn btn-outline" onclick="openMsgModal(null)">💬 全員へ</button>
  </div>
  <div class="hright">
    <div class="status-bar"><div class="dot" id="cdot"></div><span id="cstatus">未接続</span></div>
    <button class="btn btn-danger" id="end-btn" style="display:none;" onclick="endSession()">終了</button>
  </div>
</header>

<div class="main">
  <!-- Setup -->
  <div id="setup-panel">
    <h2>授業モニタリング</h2>
    <p>Firebase設定を入力してセッションを開始してください。</p>
    <div class="ig"><label>クラス名（任意）</label><input type="text" id="class-name" placeholder="例：3年1組 数学"/></div>
    <div class="ig"><label>Firebase API Key</label><input type="text" id="fb-apikey" placeholder="AIzaSy..."/></div>
    <div class="ig"><label>Firebase Database URL</label><input type="text" id="fb-dburl" placeholder="https://your-project-default-rtdb.firebaseio.com"/></div>
    <div class="ig"><label>Firebase Project ID</label><input type="text" id="fb-projectid" placeholder="your-project-id"/></div>
    <button class="btn btn-primary" style="width:100%;padding:11px;font-size:13px;margin-top:5px;justify-content:center;" onclick="startSession()">🚀 セッション開始</button>
  </div>

  <!-- Control bar -->
  <div id="control-bar">
    <div class="stats">
      <div class="stat"><div class="stat-value" id="stat-c">0</div><div class="stat-label">接続中</div></div>
      <div class="stat"><div class="stat-value" id="stat-s">0</div><div class="stat-label">共有中</div></div>
      <div class="stat"><div class="stat-value" id="stat-f">0</div><div class="stat-label">集中中</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <!-- View tabs -->
      <div class="view-tabs">
        <button class="view-tab active" id="tab-monitor" onclick="switchView('monitor')">🖥 モニタリング</button>
        <button class="view-tab" id="tab-wb" onclick="switchView('wb')">📋 ホワイトボード</button>
      </div>
      <select id="grid-size" onchange="updateGridSize()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:7px;font-family:inherit;font-size:11px;outline:none;">
        <option value="2">2列</option><option value="3">3列</option><option value="4" selected>4列</option><option value="5">5列</option>
      </select>
    </div>
  </div>

  <!-- Share URL -->
  <div id="share-box">
    <div class="share-title">📎 生徒用URL</div>
    <div class="url-row"><div class="url-display" id="share-url"></div><button class="copy-btn" id="copy-btn" onclick="copyUrl()">コピー</button></div>
  </div>

  <!-- Whiteboard controls (shown in wb view) -->
  <div id="wb-controls">
    <div class="wb-ctrl-row">
      <div style="display:flex;flex-direction:column;gap:4px;flex:1;">
        <span style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;">生徒への指示（ホワイトボード上部に表示）</span>
        <input type="text" class="wb-input" id="wb-instruction" placeholder="例：今日学んだことを図にしてみましょう"/>
      </div>
      <button class="btn btn-wb" onclick="sendWbInstruction()">📤 指示を送る</button>

// Firebase が読み込まれるまでセッション開始ボタンを無効化

let db=null,sessionId=null,peerConnections={},students={},msgTargetId=null;
window.currentFsId=null;
let currentBroadcastId=null,teacherStream=null,teacherSharing=false;
let surveyType='choice',surveyActive=false,namesVisible=false;
let currentView='monitor';
let wbActive=false;
let wbSubmissions={}, wbLbKeys=[], wbLbIdx=0;
const LABELS=['A','B','C','D'];
const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:'stun:stun2.l.google.com:19302'},{urls:'stun:stun3.l.google.com:19302'}],iceCandidatePoolSize:10,bundlePolicy:'max-bundle',rtcpMuxPolicy:'require'};

function gid(){return Math.random().toString(36).substr(2,8).toUpperCase();}
function toast(msg,d=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== SESSION =====
window.startSession=async function(){
  const ak=document.getElementById('fb-apikey').value.trim();
  const du=document.getElementById('fb-dburl').value.trim();
  const pi=document.getElementById('fb-projectid').value.trim();
  if(!ak||!du||!pi){toast('⚠️ Firebase設定を入力してください');return;}
  if(!window.FB){toast('⚠️ Firebase SDKの読み込み中です。しばらく待ってから再度お試しください');return;}
  try{const app=window.FB.initializeApp({apiKey:ak,databaseURL:du,projectId:pi},'t-'+Date.now());db=window.FB.getDatabase(app);}catch(e){toast('❌ '+e.message);return;}
  sessionId=gid();
  const{ref,set}=window.FB;
  await set(ref(db,`sessions/${sessionId}`),{className:document.getElementById('class-name').value||'クラス',createdAt:Date.now(),active:true});
  const base=location.href.replace('teacher.html','student.html');
  const url=`${base}?session=${sessionId}&db=${encodeURIComponent(du)}&apiKey=${encodeURIComponent(ak)}&projectId=${encodeURIComponent(pi)}`;
  document.getElementById('setup-panel').style.display='none';
  document.getElementById('control-bar').style.display='flex';
  document.getElementById('share-box').style.display='block';
  document.getElementById('end-btn').style.display='';
  document.getElementById('hactions').style.display='flex';
  document.getElementById('share-url').textContent=url;
  const dot=document.getElementById('cdot');dot.style.background='var(--green)';dot.style.animation='pulse 2s infinite';
  document.getElementById('cstatus').textContent=sessionId;
  listenStudents();
  toast('✅ セッション開始！URLを生徒に送ってください');
};

window.endSession=async function(){
  if(!confirm('セッションを終了しますか？'))return;
  if(teacherStream)teacherStream.getTracks().forEach(t=>t.stop());
  await window.FB.remove(window.FB.ref(db,`sessions/${sessionId}`));
  location.reload();
};

// ===== WHITEBOARD =====
window.sendWbInstruction=async function(){

};

window.sendWbCommand=async function(cmd){
  const{ref,set}=window.FB;
  if(cmd==='open'){
    wbActive=true;
    const instr=document.getElementById('wb-instruction').value.trim();
    // instructionと同時に配布（順序保証）
    if(instr) await set(ref(db,`sessions/${sessionId}/wb/instruction`),instr);
    await set(ref(db,`sessions/${sessionId}/wb/active`),true);
    toast('📋 ホワイトボードを配布しました（指示も同時送信）');
  }
  else if(cmd==='collect'){await set(ref(db,`sessions/${sessionId}/wb/active`),false);wbActive=false;toast('📥 ホワイトボードを回収しました');}
  else if(cmd==='clear'){
    if(!confirm('全員のホワイトボードを消去しますか？'))return;
    await set(ref(db,`sessions/${sessionId}/wb/resetTs`),Date.now());
    await window.FB.remove(ref(db,`sessions/${sessionId}/wb/submissions`));
    wbSubmissions={};updateWbStats();toast('🗑️ 全員のホワイトボードを消去しました');
  }
};

function listenWbData(){
  const{ref,onValue}=window.FB;
  // Listen to wb submissions (canvas snapshots)
  onValue(ref(db,`sessions/${sessionId}/wb/snapshots`),snap=>{
    if(!snap.exists())return;
    const data=snap.val();
    Object.entries(data).forEach(([sid,imgData])=>{
      updateCardWbPreview(sid,imgData);
    });
  });
  onValue(ref(db,`sessions/${sessionId}/wb/submissions`),snap=>{
    wbSubmissions=snap.exists()?snap.val():{};
    updateWbStats();
    // Update submitted badges
    Object.keys(students).forEach(sid=>{
      const el=document.getElementById('wb-sub-'+sid);
      if(el)el.style.display=wbSubmissions[sid]?'':'none';
    });
  });
  onValue(ref(db,`sessions/${sessionId}/wb/drawing`),snap=>{
    if(!snap.exists())return;
    const data=snap.val();
    Object.entries(data).forEach(([sid,isDrawing])=>{
      const el=document.getElementById('wb-dot-'+sid);
      if(el)el.style.display=isDrawing?'':'none';

  });
}

function updateCardWbPreview(sid,imgData){
  const img=document.getElementById('wb-img-'+sid);
  const ph=document.getElementById('wb-ph-'+sid);

function updateWbStats(){
  const open=Object.keys(students).length;

window.openWbFullscreen=function(sid){

    if(wbSubmissions[sid]){
      document.getElementById('fs-wb-img').src=wbSubmissions[sid].image;

  } else {

window.wbLbNav=function(dir){

  const img=document.getElementById('wb-img-'+sid);
  if(img&&img.src&&img.style.display!=='none') document.getElementById('fs-wb-img').src=img.src;
  else if(wbSubmissions[sid]) document.getElementById('fs-wb-img').src=wbSubmissions[sid].image;
  document.getElementById('fs-wb-name').textContent=students[sid]?.name||'生徒';
  document.getElementById('fs-wb-nav').textContent=`${wbLbIdx+1} / ${wbLbKeys.length}`;

// ===== LISTEN =====
function listenStudents(){
  const{ref,onChildAdded,onChildChanged,onChildRemoved}=window.FB;
  onChildAdded(ref(db,`sessions/${sessionId}/students`),snap=>{
    const sid=snap.key,d=snap.val();
    if(!students[sid]){
      students[sid]={...d,id:sid};
      addCard(sid,d);
      // 参加時点でsharingなら即接続、waitingなら共有開始を待つ
      if(d.status==='sharing') setupPC(sid);
    }
  });
  onChildChanged(ref(db,`sessions/${sessionId}/students`),snap=>{
    const sid=snap.key,d=snap.val();
    if(students[sid])students[sid]={...students[sid],...d};
    if(d.shareType)updateShareType(sid,d.shareType);
    // status が含まれていない変化（shareType だけ等）は無視
    if(!d.hasOwnProperty('status'))return;
    if(d.status==='waiting'){
      const v=document.getElementById('v-'+sid);
      const ph=document.getElementById('ph-'+sid);
      if(v){v.srcObject=null;v.style.display='none';}
      if(ph)ph.style.display='';
      setBadge(sid,'waiting');updateStats();
    }
    if(d.status==='sharing'){
      setupPC(sid);
    }
  });
  onChildRemoved(ref(db,`sessions/${sessionId}/students`),snap=>removeCard(snap.key));
  window.FB.onChildAdded(ref(db,`sessions/${sessionId}/signals`),snap=>{
    const sig=snap.val();
    if(!sig||sig.to!=='teacher')return;
    if(sig.type==='answer')handleAnswer(sig.from,sig.sdp);
    else if(sig.type==='ice')handleRIce(sig.from,sig.candidate);
    else if(sig.type==='tw-answer')handleTWAnswer(sig.from,sig.sdp);
    else if(sig.type==='tw-ice')handleTWIce(sig.from,sig.candidate);
    else if(sig.type==='watch-answer')handleWatchAnswer(sig.from,sig.sdp);
    else if(sig.type==='watch-answer-ice')handleWatchAnswerIce(sig.from,sig.candidate);
  });
  window.FB.onValue(window.FB.ref(db,`sessions/${sessionId}/surveyAnswers`),snap=>{
    if(surveyActive)renderResults(snap.exists()?snap.val():{});
  });
}

// ===== WebRTC Monitoring =====
let reconnectTimers={};

async function setupPC(sid){
  if(peerConnections[sid]){try{peerConnections[sid].close();}catch(e){}}
  const pc=new RTCPeerConnection(ICE);peerConnections[sid]=pc;

  pc.ontrack=ev=>{
    const v=document.getElementById('v-'+sid),ph=document.getElementById('ph-'+sid);
    if(v){
      if(ev.streams&&ev.streams[0]){v.srcObject=ev.streams[0];}
      else{const ms=new MediaStream();ms.addTrack(ev.track);v.srcObject=ms;}
      v.play().catch(()=>{});
      v.style.display='block';if(ph)ph.style.display='none';setBadge(sid,'live');updateStats();
    }
  };
  pc.onicecandidate=ev=>{if(ev.candidate)sig(sid,{type:'ice',from:'teacher',to:sid,candidate:ev.candidate.toJSON()});};

  pc.onconnectionstatechange=()=>{
    const state=pc.connectionState;
    if(state==='connected'){
      const v=document.getElementById('v-'+sid);if(v&&v.srcObject)v.play().catch(()=>{});
      setBadge(sid,'live');updateStats();
    }
    // failedのみ即再接続。disconnectedは一時的な場合が多いためICE再起動で様子見
    if(state==='failed'){
      clearTimeout(reconnectTimers[sid]);
      setBadge(sid,'waiting');updateStats();
      setTimeout(()=>{if(students[sid]&&peerConnections[sid]===pc)setupPC(sid);},2000);
    }
    if(state==='closed'){setBadge(sid,'waiting');updateStats();}
  };

  pc.oniceconnectionstatechange=()=>{
    const iceState=pc.iceConnectionState;
    if(iceState==='connected'||iceState==='completed'){
      const v=document.getElementById('v-'+sid);if(v&&v.srcObject)v.play().catch(()=>{});
      setBadge(sid,'live');updateStats();
    }
    // disconnectedは10秒様子見してからICE再起動
    if(iceState==='disconnected'){
      reconnectTimers[sid]=setTimeout(async()=>{
        if(!peerConnections[sid]||peerConnections[sid]!==pc)return;
        if(pc.iceConnectionState!=='disconnected')return;
        console.log('[ICE] disconnected > 10s, restarting:',sid);
        try{
          const offer=await pc.createOffer({iceRestart:true,offerToReceiveVideo:true,offerToReceiveAudio:false});
          await pc.setLocalDescription(offer);
          sig(sid,{type:'offer',from:'teacher',to:sid,sdp:{type:offer.type,sdp:offer.sdp}});
        }catch(e){if(students[sid])setupPC(sid);}
      },10000);
    } else {
      clearTimeout(reconnectTimers[sid]);
    }
    if(iceState==='failed'){
      clearTimeout(reconnectTimers[sid]);
      if(students[sid]&&peerConnections[sid]===pc)setupPC(sid);
    }
  };

  const offer=await pc.createOffer({offerToReceiveVideo:true,offerToReceiveAudio:false});
  await pc.setLocalDescription(offer);
  sig(sid,{type:'offer',from:'teacher',to:sid,sdp:{type:offer.type,sdp:offer.sdp}});
}
async function handleAnswer(sid,sdp){
  const pc=peerConnections[sid];if(!pc)return;
  // signalingStateがhave-local-offerでないと失敗するが、iceRestartのケースも考慮
  if(pc.signalingState!=='have-local-offer'){console.warn('[answer ignored, state:'+pc.signalingState+']');return;}
  try{await pc.setRemoteDescription(new RTCSessionDescription(sdp));}catch(e){console.error('[setRemoteDesc]',e);}
}
async function handleRIce(sid,c){const pc=peerConnections[sid];if(!pc)return;try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}

// ===== Teacher screen → students =====
let twPcs={};
window.toggleTeacherShare=async function(){teacherSharing?stopTS():await startTS();};
async function startTS(){
  try{
    teacherStream=await navigator.mediaDevices.getDisplayMedia({
      video:{
        width:{ideal:1920,max:2560},
        height:{ideal:1080,max:1440},
        frameRate:{ideal:30,max:60}
      },
      audio:false
    });
    teacherSharing=true;
    document.getElementById('tshare-btn').textContent='⏹ 共有停止';
    document.getElementById('tshare-btn').style.background='var(--red)';
    teacherStream.getVideoTracks()[0].onended=()=>stopTS();
    cmd('all','teacherShare',{});
    for(const sid of Object.keys(students))await setupTWPc(sid);
    toast('📺 先生の画面を全員に配信中');
  }catch(e){console.error('[startTS]',e);if(e.name!=='NotAllowedError')toast('❌ 画面共有エラー: '+e.message);}
}
function stopTS(){
  if(teacherStream){teacherStream.getTracks().forEach(t=>t.stop());teacherStream=null;}
  teacherSharing=false;
  document.getElementById('tshare-btn').textContent='📺 画面を共有';
  document.getElementById('tshare-btn').style.background='';
  cmd('all','stopTeacherShare',{});
  for(const sid of Object.keys(twPcs))twPcs[sid]?.close();
  twPcs={};
  toast('⏹ 先生の画面共有を停止しました');
}
// 送信ビットレートを上げるヘルパー（teacher→生徒 配信用）
async function setHighBitrate(pc, kbps=4000){
  const senders = pc.getSenders();
  for(const sender of senders){
    if(!sender.track || sender.track.kind !== 'video') continue;
    try{
      const params = sender.getParameters();
      if(!params.encodings || params.encodings.length === 0) params.encodings = [{}];
      params.encodings[0].maxBitrate = kbps * 1000;
      params.encodings[0].maxFramerate = 30;
      await sender.setParameters(params);
      console.log('[bitrate] set to', kbps, 'kbps');
    } catch(e){ console.warn('[setParameters]', e); }
  }
}

async function setupTWPc(sid){
  if(!teacherStream){console.warn('[TW] no teacherStream');return;}
  try{
    if(twPcs[sid]){try{twPcs[sid].close();}catch(e){}}
    const pc=new RTCPeerConnection(ICE);twPcs[sid]=pc;
    teacherStream.getTracks().forEach(t=>pc.addTrack(t,teacherStream));
    pc.onicecandidate=ev=>{if(ev.candidate)sig(sid,{type:'tw-ice-offer',from:'teacher',to:sid,candidate:ev.candidate.toJSON()});};
    pc.onconnectionstatechange=()=>{
      console.log('[TW->'+sid+']',pc.connectionState);
      if(pc.connectionState==='connected') setHighBitrate(pc,4000);
    };
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    sig(sid,{type:'tw-offer',from:'teacher',to:sid,sdp:{type:offer.type,sdp:offer.sdp}});
    console.log('[TW] offer sent to',sid);
  }catch(e){console.error('[setupTWPc]',e);toast('❌ 先生画面配信エラー: '+e.message);}
}
async function handleTWAnswer(sid,sdp){const pc=twPcs[sid];if(!pc){console.warn('[TW] no pc for',sid);return;}try{await pc.setRemoteDescription(new RTCSessionDescription(sdp));console.log('[TW] remoteDesc set for',sid);}catch(e){console.error('[handleTWAnswer]',e);}}
async function handleTWIce(sid,c){const pc=twPcs[sid];if(!pc)return;try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}

// ===== Student screen broadcast =====
let studentBcastPcs={};
window.broadcastStudentScreen=function(sid){
  if(!sid){toast('生徒を選択してください');return;}
  const srcPc=peerConnections[sid];
  // PCがない、またはliveなトラックがない場合: video要素のsrcObjectから試みる
  let stream=null;
  if(srcPc){
    const tracks=srcPc.getReceivers().map(r=>r.track).filter(t=>t&&t.readyState==='live');
    if(tracks.length>0) stream=new MediaStream(tracks);
  }
  // フォールバック: video要素のsrcObjectを使う
  if(!stream){
    const v=document.getElementById('v-'+sid);
    if(v&&v.srcObject){
      const tracks=[...v.srcObject.getTracks()].filter(t=>t.readyState==='live');
      if(tracks.length>0) stream=new MediaStream(tracks);
    }
  }
  if(!stream){
    console.warn('[broadcastStudentScreen] no stream for',sid, 'pc:',srcPc?.connectionState);
    toast('この生徒の映像が取得できません（共有中か確認してください）');
    return;
  }
  if(currentBroadcastId)stopBcast();
  currentBroadcastId=sid;
  document.getElementById('card-'+sid)?.classList.add('focused');
  startStudentBroadcast(sid,stream);
  toast(`📡 ${students[sid]?.name||'生徒'}の画面を全員に共有中`);
};
async function startStudentBroadcast(sourceSid,stream){
  for(const sid of Object.keys(students)){
    if(sid===sourceSid)continue;
    await setupStudentBcastPc(sid,stream);
  }
}
async function setupStudentBcastPc(sid,stream){
  try{
    if(studentBcastPcs[sid]){try{studentBcastPcs[sid].close();}catch(e){}}
    const pc=new RTCPeerConnection(ICE);studentBcastPcs[sid]=pc;
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));
    pc.onicecandidate=ev=>{if(ev.candidate)sig(sid,{type:'watch-ice',from:'teacher',to:sid,candidate:ev.candidate.toJSON()});};
    pc.onconnectionstatechange=()=>{
      console.log('[Watch->'+sid+']',pc.connectionState);
      if(pc.connectionState==='connected') setHighBitrate(pc,3000);
    };
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    sig(sid,{type:'watch-offer',from:'teacher',to:sid,sdp:{type:offer.type,sdp:offer.sdp}});
    console.log('[Watch] offer sent to',sid);
  }catch(e){console.error('[setupStudentBcastPc]',e);toast('❌ 生徒画面配信エラー: '+e.message);}
}
window.stopBroadcastScreen=function(){if(!currentBroadcastId){toast('共有中の画面はありません');return;}stopBcast();toast('⏹ 画面共有を停止しました');};
function stopBcast(){if(!currentBroadcastId)return;cmd('all','stopWatch',{});document.getElementById('card-'+currentBroadcastId)?.classList.remove('focused');currentBroadcastId=null;for(const sid of Object.keys(studentBcastPcs))studentBcastPcs[sid]?.close();studentBcastPcs={};}
async function handleWatchAnswer(sid,sdp){const pc=studentBcastPcs[sid];if(!pc){console.warn('[Watch] no pc for',sid);return;}try{await pc.setRemoteDescription(new RTCSessionDescription(sdp));console.log('[Watch] remoteDesc set for',sid);}catch(e){console.error('[handleWatchAnswer]',e);}}
async function handleWatchAnswerIce(sid,c){const pc=studentBcastPcs[sid];if(!pc)return;try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}

// ===== Focus =====
window.focusStudent=function(sid){if(!sid)return;cmd(sid,'focus');students[sid].focused=true;document.getElementById('card-'+sid)?.classList.add('focused');setBadge(sid,'focused');document.getElementById('fb-'+sid)?.classList.add('af');updateStats();toast('🎯 集中画面を表示しました');};
window.unfocusStudent=function(sid){if(!sid)return;cmd(sid,'unfocus');if(students[sid])students[sid].focused=false;document.getElementById('card-'+sid)?.classList.remove('focused');setBadge(sid,'live');document.getElementById('fb-'+sid)?.classList.remove('af');updateStats();toast('✅ 集中を解除しました');};
window.broadcastFocus=function(){cmd('all','focus');Object.keys(students).forEach(sid=>{students[sid].focused=true;document.getElementById('card-'+sid)?.classList.add('focused');setBadge(sid,'focused');document.getElementById('fb-'+sid)?.classList.add('af');});updateStats();toast('🎯 全員に集中画面を表示しました');};
window.broadcastUnfocus=function(){cmd('all','unfocus');Object.keys(students).forEach(sid=>{if(students[sid])students[sid].focused=false;document.getElementById('card-'+sid)?.classList.remove('focused');setBadge(sid,'live');document.getElementById('fb-'+sid)?.classList.remove('af');});updateStats();toast('✅ 全員の集中を解除しました');};

// ===== Survey =====
window.openSurvey=function(t){surveyType=t;document.getElementById('survey-panel').classList.add('show');switchTab(t);};
window.closeSurvey=function(){document.getElementById('survey-panel').classList.remove('show');};
window.switchTab=function(t){surveyType=t;document.getElementById('tab-choice').classList.toggle('active',t==='choice');document.getElementById('tab-free').classList.toggle('active',t==='free');document.getElementById('choice-sec').style.display=t==='choice'?'':'none';document.getElementById('free-sec').style.display=t==='free'?'':'none';};
window.addChoice=function(){const c=document.getElementById('choices');const n=c.children.length;if(n>=4){toast('最大4つです');return;}const row=document.createElement('div');row.className='choice-row';row.innerHTML=`<span class="clabel">${LABELS[n]}</span><input type="text" class="si ci" placeholder="選択肢${LABELS[n]}"/><button class="rm-ch" onclick="removeChoice(this)">✕</button>`;c.appendChild(row);if(n+1>=4)document.getElementById('add-ch-btn').style.display='none';updateRmBtns();};
window.removeChoice=function(btn){const c=document.getElementById('choices');btn.closest('.choice-row').remove();Array.from(c.children).forEach((row,i)=>{row.querySelector('.clabel').textContent=LABELS[i];row.querySelector('input').placeholder='選択肢'+LABELS[i];});document.getElementById('add-ch-btn').style.display='';updateRmBtns();};
function updateRmBtns(){const rows=Array.from(document.getElementById('choices').children);rows.forEach(row=>{const b=row.querySelector('.rm-ch');if(b)b.style.display=rows.length>2?'':'none';});}
window.startSurvey=async function(){
  const q=document.getElementById('sq').value.trim();if(!q){toast('⚠️ 質問文を入力してください');return;}
  let choices=[];
  if(surveyType==='choice'){choices=Array.from(document.querySelectorAll('.ci')).map(i=>i.value.trim()).filter(Boolean);if(choices.length<2){toast('⚠️ 選択肢を2つ以上入力してください');return;}}
  const{ref,set,remove}=window.FB;
  await remove(ref(db,`sessions/${sessionId}/surveyAnswers`));
  await set(ref(db,`sessions/${sessionId}/survey`),{type:surveyType,question:q,choices,active:true,ts:Date.now()});
  surveyActive=true;namesVisible=false;
  document.getElementById('survey-panel').classList.remove('show');
  document.getElementById('results-panel').classList.add('show');
  document.getElementById('rtitle').textContent=surveyType==='choice'?'📊 リアルタイム集計':'✏️ 自由記述回答';
  document.getElementById('rq').textContent=q;
  document.getElementById('name-toggle-area').style.display='';
  document.getElementById('ntbtn').textContent='👤 名前を表示';
  renderResults({});toast('📤 アンケートを送信しました');
};
window.endSurvey=async function(){const{ref,set}=window.FB;await set(ref(db,`sessions/${sessionId}/survey/active`),false);surveyActive=false;closeResults();toast('🛑 アンケートを終了しました');};
window.closeResults=function(){document.getElementById('results-panel').classList.remove('show');};
window.toggleNames=function(){
  namesVisible=!namesVisible;
  document.getElementById('ntbtn').textContent=namesVisible?'👤 名前を非表示':'👤 名前を表示';
  // 自由記述の名前
  document.querySelectorAll('.free-name').forEach(el=>el.classList.toggle('hidden',!namesVisible));
  // 選択式の投票者名
  document.querySelectorAll('.bar-voters').forEach(el=>el.classList.toggle('hidden',!namesVisible));
};
function renderResults(answers){
  window.FB.onValue(window.FB.ref(db,`sessions/${sessionId}/survey`),snap=>{if(!snap.exists())return;const sv=snap.val();const rc=document.getElementById('rcontent');if(sv.type==='choice')renderChoice(sv,answers,rc);else renderFree(answers,rc);},{onlyOnce:true});
}
function renderChoice(sv,answers,c){
  const votes={};const vnames={};sv.choices.forEach(ch=>{votes[ch]=0;vnames[ch]=[];});Object.values(answers).forEach(a=>{if(votes[a.answer]!==undefined){votes[a.answer]++;vnames[a.answer].push(a.name);}});
  const total=Object.values(answers).length;const cols=['bc0','bc1','bc2','bc3'];
  c.innerHTML=sv.choices.map((ch,i)=>{
    const cnt=votes[ch]||0;const pct=total>0?Math.round(cnt/total*100):0;
    const names=vnames[ch].join('、');
    // namesVisible の状態に応じて hidden クラスを付与
    const hiddenClass=namesVisible?'':'hidden';
    return `<div class="bar-row"><div class="bar-label"><span>${LABELS[i]}. ${esc(ch)}</span><span class="bar-count">${cnt}票 (${pct}%)</span></div><div class="bar-track"><div class="bar-fill ${cols[i]}" style="width:${pct}%">${pct>15?pct+'%':''}</div></div>${names?`<div class="bar-voters ${hiddenClass}">${esc(names)}</div>`:''}</div>`;
  }).join('')+`<div style="margin-top:10px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;">回答数: ${total} / ${Object.keys(students).length}</div>`;
}
function renderFree(answers,c){
  const items=Object.values(answers);const total=Object.keys(students).length;
  c.innerHTML=items.length===0?`<div style="text-align:center;color:var(--muted);padding:22px;font-size:13px;">まだ回答がありません</div>`:items.map(a=>`<div class="free-item"><div class="free-text">${esc(a.answer)}</div><div class="free-name${namesVisible?'':' hidden'}">— ${esc(a.name)}</div></div>`).join('')+`<div style="margin-top:7px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;">回答数: ${items.length} / ${total}</div>`;
}

// ===== Messages =====
window.openMsgModal=function(sid){msgTargetId=sid;document.getElementById('mtarget').textContent=sid?`送信先: ${students[sid]?.name||'生徒'}`:'送信先: 全員';document.getElementById('minput').value='';document.getElementById('msg-modal').classList.add('show');setTimeout(()=>document.getElementById('minput').focus(),100);};
window.closeMsgModal=function(){document.getElementById('msg-modal').classList.remove('show');};
window.setQM=function(t){document.getElementById('minput').value=t;document.getElementById('minput').focus();};
window.sendMessage=function(){const text=document.getElementById('minput').value.trim();if(!text){toast('⚠️ メッセージを入力してください');return;}cmd(msgTargetId||'all','message',{text});closeMsgModal();toast('💬 送信しました');};

function sig(to,data){const{ref,set}=window.FB;set(ref(db,`sessions/${sessionId}/signals/${data.from}_${to}_${Date.now()}`),data);}
function cmd(target,command,extra={}){const{ref,set}=window.FB;set(ref(db,`sessions/${sessionId}/commands/${target}`),{command,...extra,ts:Date.now()});}

// ===== Cards =====
function addCard(sid,data){
  document.getElementById('empty-state').style.display='none';
  const name=data.name||`生徒${Object.keys(students).length}`;
  const initial=name.charAt(0);
  const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const card=document.createElement('div');card.className='student-card';card.id='card-'+sid;
  const avHtml=data.photoURL?`<img class="avatar" src="${data.photoURL}" alt="">`:`<div class="avatar-ph">${initial}</div>`;
  card.innerHTML=`
    <div class="card-header">
      <div class="student-info">${avHtml}<div style="min-width:0"><div class="sname"><span>${esc(name)}</span><span class="share-type" id="st-${sid}" style="display:none;"></span></div><div class="semail">${esc(data.email||'')}</div></div></div>
      <span class="badge badge-waiting" id="badge-${sid}">待機中</span>
    </div>
    <div id="content-${sid}"></div>
    <div class="card-footer">
      <span class="jtime">${now}</span>
      <div class="card-actions" id="actions-${sid}"></div>
    </div>`;
  document.getElementById('grid').appendChild(card);
  updateCardContent(sid);
  if(teacherSharing)setupTWPc(sid);
  updateStats();
}

function updateCardContent(sid){
  const contentEl=document.getElementById('content-'+sid);
  const actionsEl=document.getElementById('actions-'+sid);
  if(!contentEl)return;
  if(currentView==='monitor'){
    contentEl.innerHTML=`
      <div class="screen-area" onclick="openFullscreen('${sid}')">
        <video id="v-${sid}" autoplay playsinline></video>
        <div class="screen-ph" id="ph-${sid}"><div class="screen-ph-icon">⏳</div><div class="screen-ph-text">画面共有を待っています</div></div>
      </div>`;
    actionsEl.innerHTML=`
      <button class="icon-btn" id="fb-${sid}" onclick="focusStudent('${sid}')">🎯</button>
      <button class="icon-btn" onclick="unfocusStudent('${sid}')">✅</button>
      <button class="icon-btn" onclick="broadcastStudentScreen('${sid}')">📡</button>
      <button class="icon-btn" onclick="openMsgModal('${sid}')">💬</button>
      <button class="icon-btn" onclick="openFullscreen('${sid}')">⛶</button>`;
    // ビュー切替後に既存ストリームを新しいvideo要素に再アタッチ
    const pc=peerConnections[sid];
    if(pc){
      const receivers=pc.getReceivers();
      if(receivers.length>0){
        const stream=new MediaStream(receivers.map(r=>r.track).filter(t=>t.readyState==='live'));
        if(stream.getTracks().length>0){
          const v=document.getElementById('v-'+sid);
          const ph=document.getElementById('ph-'+sid);
          if(v){
            v.srcObject=stream;
            v.play().catch(()=>{});
            v.style.display='block';
            if(ph)ph.style.display='none';
            setBadge(sid,'live');
          }
        }
      }
    }
  } else {
    // Whiteboard view
    contentEl.innerHTML=`
      <div class="wb-area" onclick="openWbFullscreen('${sid}')">
        <img id="wb-img-${sid}" src="" alt="" class="wb-canvas-preview" style="display:none;"/>
        <div class="wb-ph" id="wb-ph-${sid}"><div class="wb-ph-icon">✏️</div><div class="wb-ph-text">まだ描いていません</div></div>
        <div class="wb-submitted-badge" id="wb-sub-${sid}" style="display:none;">提出済</div>
        <div class="wb-drawing-dot" id="wb-dot-${sid}" style="display:none;"></div>
      </div>`;
    actionsEl.innerHTML=`
      <button class="icon-btn" onclick="openWbFullscreen('${sid}')">⛶ 拡大</button>
      <button class="icon-btn" onclick="openMsgModal('${sid}')">💬</button>`;
  }
}

function removeCard(sid){
  document.getElementById('card-'+sid)?.remove();
  clearTimeout(reconnectTimers[sid]);delete reconnectTimers[sid];
  peerConnections[sid]?.close();delete peerConnections[sid];
  twPcs[sid]?.close();delete twPcs[sid];
  studentBcastPcs[sid]?.close();delete studentBcastPcs[sid];
  delete students[sid];
  if(currentBroadcastId===sid)stopBcast();
  updateStats();
  if(Object.keys(students).length===0)document.getElementById('empty-state').style.display='';
}

function updateShareType(sid,t){const el=document.getElementById('st-'+sid);if(!el)return;el.style.display='';const ok=t==='画面全体';el.textContent=t;el.className='share-type '+(ok?'st-ok':'st-warn');}
function setBadge(sid,status){const b=document.getElementById('badge-'+sid);if(!b)return;const map={live:['badge-live','LIVE'],waiting:['badge-waiting','待機中'],focused:['badge-focused','🎯 集中中']};b.className='badge '+(map[status]?.[0]||'badge-waiting');b.textContent=map[status]?.[1]||'待機中';}
function updateStats(){const total=Object.keys(students).length;let s=0,f=0;document.querySelectorAll('.badge-live').forEach(()=>s++);document.querySelectorAll('.badge-focused').forEach(()=>f++);document.getElementById('stat-c').textContent=total;document.getElementById('stat-s').textContent=s;document.getElementById('stat-f').textContent=f;}

window.openFullscreen=function(sid){
  const v=document.getElementById('v-'+sid);if(!v||!v.srcObject){toast('まだ画面共有されていません');return;}
  window.currentFsId=sid;document.getElementById('fs-video').srcObject=v.srcObject;document.getElementById('fs-name').textContent=students[sid]?.name||'生徒';document.getElementById('fs-id').textContent=students[sid]?.email||'';document.getElementById('fs-overlay').classList.add('show');
};
window.closeFullscreen=function(){document.getElementById('fs-overlay').classList.remove('show');document.getElementById('fs-video').srcObject=null;window.currentFsId=null;};
window.copyUrl=function(){navigator.clipboard.writeText(document.getElementById('share-url').textContent).then(()=>{const b=document.getElementById('copy-btn');b.textContent='✓ コピー済';b.classList.add('copied');setTimeout(()=>{b.textContent='コピー';b.classList.remove('copied');},2000);});};
window.updateGridSize=function(){document.getElementById('grid').style.gridTemplateColumns=`repeat(${document.getElementById('grid-size').value},1fr)`;};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){window.closeFullscreen();closeWbFullscreen();closeMsgModal();closeSurvey();closeResults();}if(e.key==='ArrowLeft')wbLbNav(-1);if(e.key==='ArrowRight')wbLbNav(1);});
</script>
