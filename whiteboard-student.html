<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ホワイトボード｜生徒用</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
  :root { --bg:#f8f9fa; --white:#ffffff; --border:#dee2e6; --accent:#2563eb; --red:#ef4444; --green:#10b981; --text:#1e293b; --muted:#64748b; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--bg);touch-action:none;}

  /* Header */
  #header{position:fixed;top:0;left:0;right:0;z-index:100;background:white;border-bottom:2px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  #instruction{flex:1;font-size:14px;font-weight:600;color:var(--text);background:#fffbeb;border:1.5px solid #fcd34d;border-radius:8px;padding:7px 12px;line-height:1.4;min-height:36px;display:flex;align-items:center;gap:8px;}
  #instruction .inst-icon{font-size:16px;flex-shrink:0;}
  #instruction .inst-text{flex:1;}
  #instr-wait{color:var(--muted);font-weight:400;font-style:italic;font-size:13px;}

  /* Toolbar */
  #toolbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:white;border-top:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 -2px 8px rgba(0,0,0,0.06);}
  .tool-btn{width:44px;height:44px;border-radius:12px;border:2px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.15s;position:relative;}
  .tool-btn:active{transform:scale(0.92);}
  .tool-btn.active{border-color:var(--accent);background:#eff6ff;}
  .tool-sep{width:1px;height:32px;background:var(--border);}
  .color-dot{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
  .color-dot.active{border-color:var(--text);transform:scale(1.15);}
  .color-dot:active{transform:scale(0.9);}
  #pen-size{width:60px;height:36px;border:2px solid var(--border);border-radius:8px;background:white;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:600;color:var(--text);outline:none;text-align:center;cursor:pointer;}
  .submit-btn{padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .submit-btn:active{transform:scale(0.96);}
  .submit-btn.submitted{background:var(--green);}

  /* Canvas area */
  #canvas-wrap{position:fixed;top:56px;left:0;right:0;bottom:70px;overflow:hidden;background:white;}
  #wb-canvas{display:block;width:100%;height:100%;cursor:crosshair;touch-action:none;}

  /* Status */
  #status-toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(30,41,59,0.9);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:200;white-space:nowrap;}
  #status-toast.show{transform:translateX(-50%) translateY(0);}

  /* Submitted overlay */
  #submitted-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(16,185,129,0.15);align-items:center;justify-content:center;pointer-events:none;}
  #submitted-overlay.show{display:flex;}
  .submitted-badge{background:var(--green);color:white;padding:14px 28px;border-radius:16px;font-size:18px;font-weight:700;box-shadow:0 8px 24px rgba(16,185,129,0.4);}

  /* Text tool */
  #text-input-overlay { display:none; position:fixed; inset:0; z-index:200; }
  #text-input-overlay.show { display:block; }
  #text-cursor { position:absolute; background:transparent; border:none; border-bottom:2px solid #2563eb; outline:none; font-family:'Noto Sans JP',sans-serif; font-size:18px; font-weight:400; color:inherit; min-width:80px; max-width:300px; padding:2px 4px; caret-color:#2563eb; }

  /* Loading */
  #loading{position:fixed;inset:0;background:white;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--muted);">接続中...</div>
</div>

<div id="header">
  <div id="instruction">
    <span class="inst-icon">📋</span>
    <span class="inst-text" id="inst-text"><span id="instr-wait">先生の指示を待っています...</span></span>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="wb-canvas"></canvas>
</div>

<div id="toolbar">
  <button class="tool-btn active" id="btn-pen" onclick="setTool('pen')" title="ペン">✏️</button>
  <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')" title="消しゴム">🧹</button>
  <button class="tool-btn" id="btn-text" onclick="setTool('text')" title="テキスト">T</button>
  <div class="tool-sep"></div>
  <div class="color-dot active" style="background:#1e293b;" data-color="#1e293b" onclick="setColor(this)"></div>
  <div class="color-dot" style="background:#2563eb;" data-color="#2563eb" onclick="setColor(this)"></div>
  <div class="color-dot" style="background:#ef4444;" data-color="#ef4444" onclick="setColor(this)"></div>
  <div class="color-dot" style="background:#10b981;" data-color="#10b981" onclick="setColor(this)"></div>
  <div class="color-dot" style="background:#f59e0b;" data-color="#f59e0b" onclick="setColor(this)"></div>
  <div class="tool-sep"></div>
  <select id="pen-size" onchange="setPenSize(this.value)">
    <option value="2">細</option>
    <option value="4" selected>中</option>
    <option value="8">太</option>
    <option value="16">極太</option>
  </select>
  <div class="tool-sep"></div>
  <button class="tool-btn" onclick="clearCanvas()" title="全消し">🗑️</button>
  <button class="submit-btn" id="submit-btn" onclick="submitWork()">📤 提出</button>
</div>

<div id="text-input-overlay">
  <input type="text" id="text-cursor" placeholder="テキストを入力..." />
</div>

<div id="status-toast"></div>
<div id="submitted-overlay"><div class="submitted-badge">✅ 提出しました！</div></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const params = new URLSearchParams(location.search);
const sessionId = params.get('session');
const wbId = params.get('wb');
const dbUrl = params.get('db');
const apiKey = params.get('apiKey');
const projectId = params.get('projectId');

if (!sessionId || !wbId || !dbUrl || !apiKey) {
  document.getElementById('loading').innerHTML = '<div style="color:#ef4444;font-size:14px;">URLが正しくありません</div>';
  throw new Error('bad URL');
}

const app = initializeApp({ apiKey, databaseURL: dbUrl, projectId, authDomain: `${projectId}.firebaseapp.com` }, 'wb-student-' + Date.now());
const db = getDatabase(app);
const auth = getAuth(app);

let studentId = null, studentName = '';

// ===== AUTH =====
const provider = new GoogleAuthProvider();
onAuthStateChanged(auth, async user => {
  if (!user) {
    try { await signInWithPopup(auth, provider); }
    catch(e) { document.getElementById('loading').innerHTML = `<div style="color:#ef4444;font-size:14px;">ログインが必要です</div>`; }
    return;
  }
  studentId = user.uid;
  studentName = user.displayName || user.email;
  document.getElementById('loading').style.display = 'none';
  initCanvas();
  listenInstructions();
  listenReset();
});

// ===== CANVAS =====
const canvas = document.getElementById('wb-canvas');
const ctx = canvas.getContext('2d');
let tool = 'pen', penColor = '#1e293b', penSize = 4;
let drawing = false, lastX = 0, lastY = 0;
let hasContent = false;

function initCanvas() {
  resize();
  window.addEventListener('resize', resize);
  // Touch
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', () => { drawing = false; });
  // Mouse
  canvas.addEventListener('mousedown', e => { drawing = true; [lastX, lastY] = getPos(e); });
  canvas.addEventListener('mousemove', e => { if (drawing) draw(getPos(e)); });
  canvas.addEventListener('mouseup', () => { drawing = false; });
}

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (imageData.width > 0) ctx.putImageData(imageData, 0, 0);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

function onTouchStart(e) {
  e.preventDefault();
  drawing = true;
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  lastX = t.clientX - r.left;
  lastY = t.clientY - r.top;
}

function onTouchMove(e) {
  e.preventDefault();
  if (!drawing) return;
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  draw([t.clientX - r.left, t.clientY - r.top]);
}

function draw([x, y]) {
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = penSize * 4;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = penColor;
    ctx.lineWidth = penSize;
  }
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
  [lastX, lastY] = [x, y];
  hasContent = true;
  // Reset submitted state if drawing after submit
  const btn = document.getElementById('submit-btn');
  if (btn.classList.contains('submitted')) {
    btn.classList.remove('submitted');
    btn.innerHTML = '📤 提出';
    document.getElementById('submitted-overlay').classList.remove('show');
  }
}

// ===== TEXT TOOL =====
const textOverlay = document.getElementById('text-input-overlay');
const textInput = document.getElementById('text-cursor');
let textFontSize = 18;

canvas.addEventListener('click', e => {
  if (tool !== 'text') return;
  const [x, y] = getPos(e);
  textInput.style.left = (canvas.getBoundingClientRect().left + x) + 'px';
  textInput.style.top = (canvas.getBoundingClientRect().top + y - 20) + 'px';
  textInput.style.color = penColor;
  textInput.style.fontSize = Math.max(12, penSize * 3) + 'px';
  textInput.value = '';
  textOverlay.classList.add('show');
  textInput.focus();
  textInput._x = x;
  textInput._y = y;
});

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { commitText(); e.preventDefault(); }
  if (e.key === 'Escape') { textOverlay.classList.remove('show'); textInput.value = ''; }
});

textInput.addEventListener('blur', () => {
  if (textInput.value.trim()) commitText();
  else { textOverlay.classList.remove('show'); textInput.value = ''; }
});

function commitText() {
  const text = textInput.value.trim();
  if (!text) { textOverlay.classList.remove('show'); return; }
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = penColor;
  ctx.font = `${Math.max(12, penSize * 3)}px 'Noto Sans JP', sans-serif`;
  ctx.fillText(text, textInput._x, textInput._y + 20);
  textOverlay.classList.remove('show');
  textInput.value = '';
  hasContent = true;
}

// ===== TOOLS =====
window.setTool = function(t) {
  tool = t;
  document.getElementById('btn-pen').classList.toggle('active', t === 'pen');
  document.getElementById('btn-eraser').classList.toggle('active', t === 'eraser');
  document.getElementById('btn-text').classList.toggle('active', t === 'text');
  canvas.style.cursor = t === 'text' ? 'text' : 'crosshair';
};
window.setColor = function(el) {
  penColor = el.dataset.color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  setTool('pen');
};
window.setPenSize = function(v) { penSize = parseInt(v); };
window.clearCanvas = function() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  hasContent = false;
};

// ===== SUBMIT =====
window.submitWork = async function() {
  if (!studentId) return;
  const btn = document.getElementById('submit-btn');
  btn.textContent = '送信中...';
  // Export canvas as compressed JPEG data URL
  const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
  await set(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/submissions/${studentId}`), {
    name: studentName,
    image: dataUrl,
    submittedAt: Date.now()
  });
  btn.classList.add('submitted');
  btn.innerHTML = '✅ 提出済';
  document.getElementById('submitted-overlay').classList.add('show');
  setTimeout(() => document.getElementById('submitted-overlay').classList.remove('show'), 2000);
  showToast('✅ 提出しました！');
};

// ===== INSTRUCTION =====
function listenInstructions() {
  onValue(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/instruction`), snap => {
    const text = snap.exists() ? snap.val() : '';
    const el = document.getElementById('inst-text');
    if (text) {
      el.innerHTML = `<strong>${text}</strong>`;
    } else {
      el.innerHTML = '<span id="instr-wait">先生の指示を待っています...</span>';
    }
  });
}

// ===== RESET (先生がリセット指示) =====
function listenReset() {
  onValue(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/resetTs`), snap => {
    if (!snap.exists()) return;
    window.clearCanvas();
    showToast('🗑️ 先生がホワイトボードをリセットしました');
  });
}

function showToast(msg) {
  const t = document.getElementById('status-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
