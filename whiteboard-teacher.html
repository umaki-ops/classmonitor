<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホワイトボード管理｜先生用</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
  :root { --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236; --border:#1e293b; --accent:#3b82f6; --green:#10b981; --red:#ef4444; --yellow:#f59e0b; --text:#e2e8f0; --muted:#64748b; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}

  header{position:sticky;top:0;z-index:50;background:rgba(10,14,26,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;}
  .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;}
  .btn-primary{background:var(--accent);color:white;}.btn-primary:hover{background:#2563eb;}
  .btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:var(--red);color:white;}.btn-danger:hover{background:#dc2626;}
  .btn-green{background:var(--green);color:white;}.btn-green:hover{opacity:0.9;}

  .main{position:relative;z-index:1;padding:20px;max-width:1400px;margin:0 auto;}

  /* Setup */
  #setup{max-width:560px;margin:50px auto;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;}
  #setup h2{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  #setup p{color:var(--muted);margin-bottom:24px;font-size:13px;line-height:1.6;}
  .ig{margin-bottom:12px;}
  .ig label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
  .ig input,.ig textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;resize:vertical;}
  .ig input:focus,.ig textarea:focus{border-color:var(--accent);}

  /* Active session */
  #session-panel{display:none;}

  /* Top controls */
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;}
  .controls-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .ctrl-group{display:flex;flex-direction:column;gap:4px;}
  .ctrl-label{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
  .ctrl-input{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;min-width:280px;}
  .ctrl-input:focus{border-color:var(--accent);}

  /* URL share */
  .url-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:10px;display:flex;gap:8px;align-items:center;}
  .url-text{flex:1;font-family:monospace;font-size:11px;color:#67e8f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .copy-btn{padding:5px 10px;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;}

  /* Stats bar */
  .stats-bar{display:flex;gap:20px;padding:10px 0 0;margin-top:10px;border-top:1px solid var(--border);}
  .stat{display:flex;flex-direction:column;gap:1px;}
  .stat-val{font-family:monospace;font-size:18px;font-weight:700;color:var(--accent);}
  .stat-lab{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}

  /* Submissions grid */
  .section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .section-title .count{background:var(--accent);color:white;padding:1px 7px;border-radius:10px;font-size:10px;}
  #submissions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .sub-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;cursor:pointer;}
  .sub-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4);border-color:var(--accent);}
  .sub-card-header{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .sub-name{font-size:12px;font-weight:600;}
  .sub-time{font-size:10px;color:var(--muted);font-family:monospace;}
  .sub-img-wrap{background:white;aspect-ratio:4/3;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .sub-img{width:100%;height:100%;object-fit:contain;}
  .sub-empty{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:var(--surface2);}
  .sub-empty-text{font-size:11px;color:var(--muted);}

  /* Pending (not submitted) */
  .pending-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;opacity:0.5;}
  .pending-card-header{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
  .pending-name{font-size:12px;font-weight:600;color:var(--muted);}
  .pending-tag{font-size:9px;background:rgba(245,158,11,0.2);color:var(--yellow);border:1px solid rgba(245,158,11,0.3);padding:1px 6px;border-radius:8px;}
  .pending-body{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:var(--surface2);}

  /* Lightbox */
  #lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center;}
  #lightbox.show{display:flex;}
  #lb-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px;box-shadow:0 0 60px rgba(0,0,0,0.6);}
  #lb-name{color:white;font-size:16px;font-weight:700;margin-bottom:12px;}
  #lb-close{position:fixed;top:20px;right:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
  #lb-nav{display:flex;gap:12px;margin-top:14px;}
  #lb-nav button{padding:7px 18px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif;}
  #lb-nav button:hover{background:rgba(255,255,255,0.2);}

  .toast{position:fixed;bottom:20px;right:20px;z-index:2000;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  .toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">📋</div>ホワイトボード管理</div>
  <div style="display:flex;gap:8px;align-items:center;" id="header-btns">
    <button class="btn btn-outline" onclick="location.href='teacher.html'" style="display:none;" id="back-btn">← モニターに戻る</button>
    <button class="btn btn-danger" id="end-wb-btn" style="display:none;" onclick="endWhiteboard()">セッション終了</button>
  </div>
</header>

<div class="main">
  <!-- SETUP -->
  <div id="setup">
    <h2>ホワイトボードを配布</h2>
    <p>Firebase設定を入力してホワイトボードセッションを開始します。生徒用URLが生成されます。</p>
    <div class="ig"><label>Firebase API Key</label><input type="text" id="fb-apikey" placeholder="AIzaSy..."/></div>
    <div class="ig"><label>Firebase Database URL</label><input type="text" id="fb-dburl" placeholder="https://your-project-default-rtdb.firebaseio.com"/></div>
    <div class="ig"><label>Firebase Project ID</label><input type="text" id="fb-projectid" placeholder="your-project-id"/></div>
    <div class="ig"><label>セッションID（自動生成）</label><input type="text" id="session-id-input" placeholder="自動生成されます" readonly style="color:var(--muted);"/></div>
    <div class="ig"><label>生徒への指示（最初のメッセージ）</label><textarea id="initial-instruction" placeholder="例：今日のテーマについて自分の考えを書きましょう" rows="2"></textarea></div>
    <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:4px;justify-content:center;" onclick="startSession()">🚀 ホワイトボードを配布</button>
  </div>

  <!-- SESSION PANEL -->
  <div id="session-panel">
    <div class="controls">
      <div class="controls-row">
        <div class="ctrl-group" style="flex:1;">
          <div class="ctrl-label">生徒への指示（上部に表示）</div>
          <input type="text" class="ctrl-input" id="instruction-input" placeholder="例：自分の意見を書きましょう" />
        </div>
        <button class="btn btn-primary" onclick="updateInstruction()">📤 指示を更新</button>
        <button class="btn btn-outline" onclick="resetAll()">🗑️ 全員リセット</button>
        <button class="btn btn-outline" onclick="refreshResults()">🔄 更新</button>
      </div>
      <div class="url-box">
        <div class="url-text" id="wb-url-display"></div>
        <button class="copy-btn" onclick="copyUrl()">コピー</button>
      </div>
      <div class="stats-bar">
        <div class="stat"><div class="stat-val" id="stat-joined">0</div><div class="stat-lab">参加</div></div>
        <div class="stat"><div class="stat-val" id="stat-submitted">0</div><div class="stat-lab">提出済</div></div>
        <div class="stat"><div class="stat-val" id="stat-pending">0</div><div class="stat-lab">未提出</div></div>
      </div>
    </div>

    <div class="section-title">提出された回答 <span class="count" id="sub-count">0</span></div>
    <div id="submissions-grid">
      <div style="color:var(--muted);font-size:13px;padding:20px 0;">まだ提出がありません</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <div id="lb-name"></div>
  <img id="lb-img" src="" alt="" />
  <div id="lb-nav">
    <button onclick="lbNav(-1)">← 前の生徒</button>
    <button onclick="lbNav(1)">次の生徒 →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue, onChildAdded, onChildChanged, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// Pre-fill session ID
const autoId = Math.random().toString(36).substr(2, 8).toUpperCase();
const wbId = 'wb-' + Math.random().toString(36).substr(2, 6);
document.getElementById('session-id-input').value = autoId;

let db = null, sessionId = autoId;
let students = {}, submissions = {};
let lbKeys = [], lbIdx = 0;

function toast(msg, d = 3000) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), d);
}

window.startSession = async function() {
  const apiKey = document.getElementById('fb-apikey').value.trim();
  const dbUrl = document.getElementById('fb-dburl').value.trim();
  const projectId = document.getElementById('fb-projectid').value.trim();
  if (!apiKey || !dbUrl || !projectId) { toast('⚠️ Firebase設定を入力してください'); return; }

  const app = initializeApp({ apiKey, databaseURL: dbUrl, projectId }, 'wb-teacher-' + Date.now());
  db = getDatabase(app);

  const instruction = document.getElementById('initial-instruction').value.trim();
  await set(ref(db, `sessions/${sessionId}/whiteboards/${wbId}`), {
    active: true, createdAt: Date.now(),
    instruction: instruction || 'ホワイトボードに記入してください'
  });

  // Build student URL
  const base = location.href.replace('whiteboard-teacher.html', 'whiteboard-student.html');
  const url = `${base}?session=${sessionId}&wb=${wbId}&db=${encodeURIComponent(dbUrl)}&apiKey=${encodeURIComponent(apiKey)}&projectId=${encodeURIComponent(projectId)}`;
  document.getElementById('wb-url-display').textContent = url;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('session-panel').style.display = 'block';
  document.getElementById('end-wb-btn').style.display = '';
  document.getElementById('back-btn').style.display = '';
  document.getElementById('instruction-input').value = instruction || 'ホワイトボードに記入してください';

  listenSubmissions(dbUrl, apiKey, projectId);
  toast('✅ ホワイトボードを配布しました！URLを生徒に送ってください');
};

function listenSubmissions(dbUrl, apiKey, projectId) {
  // Listen to student joins (from main session students node if exists, else just submissions)
  onValue(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/submissions`), snap => {
    submissions = snap.exists() ? snap.val() : {};
    renderAll();
  });
}

window.updateInstruction = async function() {
  if (!db) return;
  const text = document.getElementById('instruction-input').value.trim();
  await set(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/instruction`), text);
  toast('📤 指示を更新しました');
};

window.resetAll = async function() {
  if (!db || !confirm('全員のホワイトボードをリセットしますか？')) return;
  await set(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/resetTs`), Date.now());
  // Clear submissions
  await remove(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/submissions`));
  submissions = {};
  renderAll();
  toast('🗑️ 全員のホワイトボードをリセットしました');
};

window.refreshResults = function() { renderAll(); toast('🔄 更新しました'); };

window.endWhiteboard = async function() {
  if (!db || !confirm('ホワイトボードセッションを終了しますか？')) return;
  await set(ref(db, `sessions/${sessionId}/whiteboards/${wbId}/active`), false);
  toast('セッションを終了しました');
};

function renderAll() {
  const grid = document.getElementById('submissions-grid');
  const subs = Object.entries(submissions);
  document.getElementById('stat-submitted').textContent = subs.length;
  document.getElementById('sub-count').textContent = subs.length;

  if (subs.length === 0) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0;">まだ提出がありません</div>';
    return;
  }

  lbKeys = subs.map(([k]) => k);

  grid.innerHTML = subs.map(([uid, data], idx) => {
    const time = new Date(data.submittedAt).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    return `<div class="sub-card" onclick="openLightbox(${idx})">
      <div class="sub-card-header">
        <span class="sub-name">${esc(data.name || '生徒')}</span>
        <span class="sub-time">${time}</span>
      </div>
      <div class="sub-img-wrap">
        <img class="sub-img" src="${data.image}" alt="${esc(data.name)}" loading="lazy" />
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Lightbox
window.openLightbox = function(idx) {
  lbIdx = idx;
  showLb();
  document.getElementById('lightbox').classList.add('show');
};

window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('show');
};

window.lbNav = function(dir) {
  lbIdx = (lbIdx + dir + lbKeys.length) % lbKeys.length;
  showLb();
};

function showLb() {
  const uid = lbKeys[lbIdx];
  const data = submissions[uid];
  if (!data) return;
  document.getElementById('lb-img').src = data.image;
  document.getElementById('lb-name').textContent = `${data.name} (${lbIdx + 1} / ${lbKeys.length})`;
}

window.copyUrl = function() {
  navigator.clipboard.writeText(document.getElementById('wb-url-display').textContent).then(() => toast('✅ URLをコピーしました'));
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') lbNav(-1); if (e.key === 'ArrowRight') lbNav(1); });
</script>
</body>
</html>
